<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cota Lab // Archive</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { --accent: #ffffff; --bg: #000000; --secondary: #666666; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--accent); font-family: "Inter", sans-serif; overflow: hidden; }

        #root { position: fixed; inset: 0; background: radial-gradient(circle at center, #111 0%, #000 70%); z-index: 1; }

        /* THE MODEL - Scaled down */
        model-viewer {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
        }

        /* THE SCROLL LAYER */
        #scroll-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            position: relative;
            z-index: 10;
        }
        .product-section { height: 100vh; scroll-snap-align: start; }

        /* THE TOGGLE BUTTON */
        .mode-toggle {
            position: fixed;
            top: 120px;
            right: 40px;
            z-index: 10000;
            background: transparent;
            border: 1px solid var(--secondary);
            color: var(--secondary);
            padding: 8px 12px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            pointer-events: auto;
        }
        .mode-toggle.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(255,255,255,0.1);
        }

        /* UI ELEMENTS */
        .interface { position: fixed; inset: 0; padding: 40px; pointer-events: none; display: flex; flex-direction: column; justify-content: flex-end; z-index: 100; }
        .bottom-ui { display: flex; justify-content: space-between; align-items: flex-end; pointer-events: auto; }
        .brand-id { position: fixed; top: 40px; width: 100%; text-align: center; font-weight: 800; letter-spacing: 0.3em; z-index: 9999; }
    </style>
</head>
<body>

    <div id="root">
        <div class="brand-id">COTA // LAB</div>
        
        <button id="toggle-btn" class="mode-toggle" onclick="toggleMode()">Mode: Scroll</button>

        <model-viewer 
            id="shirt-viewer"
            src="Tshirt.glb" 
            scale="0.7 0.7 0.7"
            auto-rotate 
            camera-controls
            shadow-intensity="1.5" 
            camera-orbit="0deg 75deg 105%"
            touch-action="pan-y">
        </model-viewer>

        <div class="interface">
            <div class="bottom-ui">
                <div class="product-info">
                    <h1 id="shirt-title" style="text-transform:uppercase; margin:0;">Archive 001</h1>
                    <p id="shirt-price" style="color:var(--secondary);">$1.15</p>
                </div>
                <button style="background:white; color:black; border:none; padding:15px 30px; font-weight:700;">ACQUIRE</button>
            </div>
        </div>
    </div>

    <div id="scroll-container">
        <section class="product-section" data-id="1"></section>
        <section class="product-section" data-id="2"></section>
    </div>

    <script>
        const modelViewer = document.querySelector('#shirt-viewer');
        const scrollContainer = document.querySelector('#scroll-container');
        const toggleBtn = document.querySelector('#toggle-btn');
        let isRotateMode = false;

        // 1. Toggle Functionality
        function toggleMode() {
            isRotateMode = !isRotateMode;
            if (isRotateMode) {
                scrollContainer.style.display = 'none'; // Remove the glass shield
                toggleBtn.innerText = "Mode: Rotate";
                toggleBtn.classList.add('active');
            } else {
                scrollContainer.style.display = 'block'; // Bring back scroll functionality
                toggleBtn.innerText = "Mode: Scroll";
                toggleBtn.classList.remove('active');
            }
        }

        // 2. Archive Data & Texture Swapping
        const archive = {
            "1": { title: "Archive 001", price: "$1.15", texture: "cota_cloud_pixelart.png" },
            "2": { title: "Archive 002", price: "$1.75", texture: "lovefont.png" }
        };

        let textureCache = {};

        modelViewer.addEventListener('load', async () => {
            for (const key in archive) {
                textureCache[key] = await modelViewer.createTexture(archive[key].texture);
            }
            const material = modelViewer.model.materials[0];

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const id = entry.target.getAttribute('data-id');
                        const data = archive[id];
                        document.getElementById('shirt-title').innerText = data.title;
                        document.getElementById('shirt-price').innerText = data.price;
                        
                        if (material && textureCache[id]) {
                            material.pbrMetallicRoughness.baseColorTexture.setTexture(textureCache[id]);
                            const sampler = material.pbrMetallicRoughness.baseColorTexture.texture.sampler;
                            sampler.setMinFilter(9728); sampler.setMagFilter(9728);
                        }
                    }
                });
            }, { threshold: 0.5 });

            document.querySelectorAll('.product-section').forEach(s => observer.observe(s));
        });
    </script>
</body>
</html>
