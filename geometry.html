<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cota Lab // Archive 001</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        :root { 
            --accent: #ffffff;
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            font-family: "Inter", sans-serif;
            overflow-x: hidden;
            color: white;
            overscroll-behavior-y: none;
        }

        /* 1. FAST RUNWAY */
        #scroll-engine {
            height: 150vh; 
            width: 100%;
            position: absolute;
            top: 0; left: 0;
            z-index: 0;
        }

        #parallax-bg {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-size: cover;
            background-position: center;
            will-change: background-image;
            pointer-events: none;
            height: 100vh;
        }

        /* 2. CENTERED LOOT */
        .model-container {
            position: fixed;
            inset: 0;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none; 
            animation: floatingBob 4s ease-in-out infinite;
        }
        @keyframes floatingBob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        model-viewer { width: 80vw; height: 50vh; outline: none; }

        /* 3. BRANDING & UI */
        .header {
            position: fixed; top: 30px; width: 100%;
            display: flex; justify-content: center; z-index: 100;
        }
        .brand-id { font-weight: 900; font-size: 11px; letter-spacing: 0.8em; text-transform: uppercase; }

        .interface {
            position: fixed; 
            bottom: 0; left: 0; right: 0;
            padding: 40px 30px;
            pointer-events: none; 
            z-index: 100;
        }
        .ui-wrap { pointer-events: auto; width: 100%; max-width: 600px; margin: 0 auto; }

        /* 4. BALANCED TOUCH SLIDER */
        .slider-container { 
            width: 100%; 
            margin-bottom: 35px; 
            display: flex;
            align-items: center;
        }
        
        #rotate {
            -webkit-appearance: none; 
            width: 100%;
            height: 44px; /* The total invisible touch height */
            background: transparent; /* Hide the default track */
            outline: none;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        /* Visible Track - Centered inside the 44px touch area */
        #rotate::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 4px; /* The visible 4px line */
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            pointer-events: none;
        }

        /* The Thumb */
        #rotate::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 44px; 
            height: 10px; 
            background: #fff; 
            border-radius: 5px;
            cursor: pointer;
            position: relative;
            z-index: 2;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* Firefox Support */
        #rotate::-moz-range-thumb {
            width: 44px; height: 10px; background: #fff; border: none; border-radius: 5px;
        }

        .bottom-ui { display: flex; justify-content: space-between; align-items: flex-end; }
        .product-info h1 { font-size: 28px; text-transform: uppercase; margin: 0; font-weight: 900; letter-spacing: -0.02em;}
        .product-info p { color: rgba(255,255,255,0.5); font-size: 11px; letter-spacing: 0.2em; margin-top: 4px; }

        .cta-button {
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            color: white; border: 1px solid rgba(255,255,255,0.15);
            padding: 14px 35px; border-radius: 100px;
            font-size: 10px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>

    <div id="scroll-engine"></div>
    <div id="parallax-bg"></div>

    <header class="header">
        <div class="brand-id">COTA // LAB</div>
    </header>

    <div class="model-container">
        <model-viewer id="viewer" src="Tshirt.glb" shadow-intensity="1" exposure="1.1" style="pointer-events:none;"></model-viewer>
    </div>

    <div class="interface">
        <div class="ui-wrap">
            <div class="slider-container">
                <input type="range" id="rotate" min="0" max="360" value="0">
            </div>
            <div class="bottom-ui">
                <div class="product-info">
                    <h1>Archive 001</h1>
                    <p>CLT // TRANSIT</p>
                </div>
                <button class="cta-button">Pre-Order</button>
            </div>
        </div>
    </div>

    <script>
        const bg = document.getElementById('parallax-bg');
        const viewer = document.getElementById('viewer');
        const slider = document.getElementById('rotate');

        const images = [
            'street-view.jpg',
            'street-view 1.jpg',
            'street-view 2.jpg',
            'street-view 3.jpg',
            'street-view 4.jpg',
            'street-view 5.jpg'
        ];

        // Rotation
        slider.oninput = (e) => {
            viewer.cameraOrbit = `${e.target.value}deg 75deg 105%`;
            viewer.autoRotate = false;
        };

        // Optimized Frame Sync
        let ticking = false;
        window.addEventListener('scroll', () => {
            if (!ticking) {
                window.requestAnimationFrame(() => {
                    const scrollTotal = document.documentElement.scrollHeight - window.innerHeight;
                    const scrollPercent = window.scrollY / scrollTotal;
                    const frameIndex = Math.min(Math.floor(scrollPercent * images.length), images.length - 1);
                    
                    bg.style.backgroundImage = `url('${images[frameIndex]}')`;
                    ticking = false;
                });
                ticking = true;
            }
        }, { passive: true });

        bg.style.backgroundImage = `url('${images[0]}')`;
    </script>
</body>
</html>
