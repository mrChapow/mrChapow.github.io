<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COTA LAB // ARCHIVE 001</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { 
            --bg: #000; 
            --text: #fff;
            --dim: rgba(255, 255, 255, 0.4);
        }
        
        body, html { margin: 0; padding: 0; background: var(--bg); font-family: "Inter", sans-serif; color: var(--text); overflow-x: hidden; -webkit-font-smoothing: antialiased; }

        /* --- NAVIGATION (Minimalist) --- */
        .site-nav {
            position: fixed; top: 0; width: 100%; height: 90px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; z-index: 1000;
        }
        .logo { font-weight: 900; font-size: 1.2rem; letter-spacing: 0.8em; text-transform: uppercase; margin-right: -0.8em; }
        .nav-link { font-size: 10px; font-weight: 800; letter-spacing: 0.3em; text-transform: uppercase; opacity: 0.5; }

        /* --- THE TRACK --- */
        .archive-stage { position: relative; height: 250vh; width: 100%; }
        
        .interface-lock {
            position: sticky; top: 0;
            height: 100vh; width: 100%;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        #parallax-bg {
            position: absolute; inset: 0; z-index: 1;
            background-size: cover; background-position: center;
            background-repeat: no-repeat;
            background-image: url('street-view.jpg');
            will-change: transform;
        }
        #parallax-bg::after {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 100%),
                        linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.8));
        }

        /* --- THE FLOATING CONTENT (No Containers) --- */
        #hero-content {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            width: 100%; height: 100vh;
            padding: 0 20px;
            /* The starting "Half-Inch" offset */
            transform: translateY(60vh); 
            will-change: transform;
        }

        .model-wrap { 
            width: 100%; height: 45vh; 
            display: flex; flex-direction: column; align-items: center;
            margin-top: 15vh;
        }
        model-viewer { width: 100%; height: 100%; outline: none; }

        /* Restored Precision Slider */
        .slider-wrap { width: 160px; margin-top: 20px; opacity: 0.6; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 1px; background: #fff; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 8px; width: 8px; border-radius: 50%; background: #fff; margin-top: -3.5px; }

        /* Typography Reveal */
        .text-wrap {
            text-align: center;
            margin-top: 40px;
            max-width: 320px;
        }
        h1 { font-size: 28px; font-weight: 900; text-transform: uppercase; margin: 0; letter-spacing: -0.03em; }
        .price { font-family: monospace; font-size: 16px; display: block; margin: 10px 0 20px; opacity: 0.5; }
        .desc { font-size: 12px; line-height: 1.8; opacity: 0.4; margin-bottom: 30px; }
        
        .buy-btn { 
            background: none; border: 1px solid #fff; color: #fff;
            padding: 15px 40px; border-radius: 0; /* Square for high-fashion look */
            font-weight: 900; text-transform: uppercase; cursor: pointer;
            letter-spacing: 0.2em; font-size: 11px;
            transition: all 0.3s;
        }
        .buy-btn:hover { background: #fff; color: #000; }

        /* DESKTOP (Split Floating) */
        @media (min-width: 1024px) {
            #hero-content { flex-direction: row; justify-content: space-around; transform: translateY(40vh); padding: 0 10vw; }
            .model-wrap { width: 50%; height: 75vh; margin-top: 0; }
            .text-wrap { text-align: left; max-width: 400px; margin-top: 0; }
            .buy-btn { width: auto; }
        }

        /* SPACE FOR NEXT SCENE */
        .next-scene-spacer { height: 120vh; background: #000; }
    </style>
</head>
<body>

    <nav class="site-nav">
        <div class="nav-link">Coll.</div>
        <div class="logo">Cota Lab</div>
        <div class="nav-link">Cart</div>
    </nav>

    <section class="archive-stage" id="track">
        <div class="interface-lock">
            <div id="parallax-bg"></div>
            
            <div id="hero-content">
                <div class="model-wrap">
                    <model-viewer id="shirt" src="Tshirt.glb" camera-orbit="0deg 75deg 105%" auto-rotate interaction-prompt="none" touch-action="none"></model-viewer>
                    <div class="slider-wrap">
                        <input type="range" id="rot" min="-180" max="180" value="0">
                    </div>
                </div>

                <div class="text-wrap">
                    <h1>CLT // 001</h1>
                    <span class="price">$54.00 USD</span>
                    <p class="desc">Engineered quality. Pixel-mapped architecture. The gap is closed. This is the first archive.</p>
                    <button class="buy-btn">Acquire Archive</button>
                </div>
            </div>
        </div>
    </section>

    <div class="next-scene-spacer"></div>

    <script>
        const bg = document.getElementById('parallax-bg');
        const content = document.getElementById('hero-content');
        const track = document.getElementById('track');
        const shirt = document.getElementById('shirt');
        const rot = document.getElementById('rot');

        const frames = ['street-view.jpg', 'street-view 1.jpg', 'street-view 2.jpg', 'street-view 3.jpg', 'street-view 4.jpg', 'street-view 5.jpg'];

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const maxScroll = track.offsetHeight - window.innerHeight;
            const progress = Math.min(Math.max(scrollY / maxScroll, 0), 1);

            // 1. BACKGROUND SWAP (Finish frames by 75% scroll)
            const frameProgress = Math.min(progress / 0.75, 1);
            const frameIdx = Math.floor(frameProgress * (frames.length - 1));
            bg.style.backgroundImage = `url('${frames[frameIdx]}')`;

            // 2. THE FLOATING REVEAL
            // Start at 60vh offset, move to -20vh (scrolling past)
            const isMobile = window.innerWidth < 1024;
            const startPos = isMobile ? 60 : 40;
            const endPos = -40;
            const currentPos = startPos - (progress * (startPos - endPos));
            content.style.transform = `translateY(${currentPos}vh)`;

            // 3. ATMOSPHERIC ZOOM
            const scale = 1 + (progress * 0.1);
            bg.style.transform = `scale(${scale})`;
        });

        // ROTATION
        rot.addEventListener('input', (e) => {
            shirt.removeAttribute('auto-rotate');
            shirt.cameraOrbit = `${e.target.value}deg 75deg 105%`;
        });

        // TEXTURE
        shirt.addEventListener('load', () => {
            const material = shirt.model.materials[0];
            const applyTex = async () => {
                const tex = await shirt.createTexture('cota_cloud_pixelart.png');
                if (material.pbrMetallicRoughness.baseColorTexture) {
                    material.pbrMetallicRoughness.baseColorTexture.setTexture(tex);
                }
            };
            applyTex();
        });
    </script>
</body>
</html>
