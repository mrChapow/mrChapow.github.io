<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cota Lab // Archive 001</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        :root { 
            --accent: #ffffff;
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            font-family: "Inter", sans-serif;
            overflow-x: hidden;
            color: white;
            /* Prevents overscroll "rubber-banding" on iOS */
            overscroll-behavior-y: none;
        }

        #scroll-engine {
            height: 150vh; /* Slightly more runway for mobile thumbs */
            width: 100%;
            position: absolute;
            top: 0; left: 0;
            z-index: 0;
        }

        #parallax-bg {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-size: cover;
            background-position: center;
            will-change: background-image;
            pointer-events: none;
            /* Ensures background covers the whole screen including under UI bars */
            height: 100vh;
            height: -webkit-fill-available;
        }

        .model-container {
            position: fixed;
            inset: 0;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none; 
            animation: floatingBob 4s ease-in-out infinite;
        }
        @keyframes floatingBob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        model-viewer { 
            width: 80vw; /* Larger for mobile */
            height: 50vh; 
            outline: none; 
        }

        .header {
            position: fixed; top: 20px; width: 100%;
            display: flex; justify-content: center; z-index: 100;
        }
        .brand-id { font-weight: 900; font-size: 10px; letter-spacing: 0.6em; text-transform: uppercase; }

        .interface {
            position: fixed; 
            bottom: 0; left: 0; right: 0;
            padding: 30px 20px;
            pointer-events: none; 
            z-index: 100;
        }
        .ui-wrap { pointer-events: auto; width: 100%; max-width: 600px; margin: 0 auto; }

        .slider-container { width: 100%; margin-bottom: 30px; }
        
        #rotate {
            -webkit-appearance: none; width: 100%;
            height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; outline: none;
            /* Increases the touch target for mobile thumbs */
            padding: 10px 0;
            background-clip: content-box;
        }
        #rotate::-webkit-slider-thumb {
            -webkit-appearance: none; width: 44px; height: 12px;
            background: #fff; border-radius: 4px; cursor: pointer;
        }

        .bottom-ui { display: flex; justify-content: space-between; align-items: center; }
        .product-info h1 { font-size: 24px; text-transform: uppercase; margin: 0; font-weight: 900; }
        .product-info p { color: rgba(255,255,255,0.5); font-size: 10px; letter-spacing: 0.1em; margin: 0; }

        .cta-button {
            background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            color: white; border: 1px solid rgba(255,255,255,0.15);
            padding: 12px 25px; border-radius: 100px;
            font-size: 9px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>

    <div id="scroll-engine"></div>
    <div id="parallax-bg"></div>

    <header class="header">
        <div class="brand-id">COTA // LAB</div>
    </header>

    <div class="model-container">
        <model-viewer id="viewer" src="Tshirt.glb" shadow-intensity="1" exposure="1.1" style="pointer-events:none;"></model-viewer>
    </div>

    <div class="interface">
        <div class="ui-wrap">
            <div class="slider-container">
                <input type="range" id="rotate" min="0" max="360" value="0">
            </div>
            <div class="bottom-ui">
                <div class="product-info">
                    <h1>Archive 001</h1>
                    <p>CLT // TRANSIT</p>
                </div>
                <button class="cta-button">Pre-Order</button>
            </div>
        </div>
    </div>

    <script>
        const bg = document.getElementById('parallax-bg');
        const viewer = document.getElementById('viewer');
        const slider = document.getElementById('rotate');

        const images = [
            'street-view.jpg',
            'street-view 1.jpg',
            'street-view 2.jpg',
            'street-view 3.jpg',
            'street-view 4.jpg',
            'street-view 5.jpg'
        ];

        // Rotation
        slider.oninput = (e) => {
            viewer.cameraOrbit = `${e.target.value}deg 75deg 105%`;
            viewer.autoRotate = false;
        };

        // Smooth Scroll Engine
        let tick = false;
        window.addEventListener('scroll', () => {
            if (!tick) {
                window.requestAnimationFrame(() => {
                    const scrollTotal = document.documentElement.scrollHeight - window.innerHeight;
                    const scrollPercent = window.scrollY / scrollTotal;
                    const frameIndex = Math.min(Math.floor(scrollPercent * images.length), images.length - 1);
                    
                    bg.style.backgroundImage = `url('${images[frameIndex]}')`;
                    tick = false;
                });
                tick = true;
            }
        }, { passive: true });

        // Force first frame
        bg.style.backgroundImage = `url('${images[0]}')`;
        
        // Mobile Height Fix (prevents jumpiness)
        window.addEventListener('resize', () => {
            document.getElementById('parallax-bg').style.height = window.innerHeight + 'px';
        });
    </script>
</body>
</html>
