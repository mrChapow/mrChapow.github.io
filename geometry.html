<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cota Lab // Archive 001</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        :root { 
            --accent: #000000;
            --bg: #ffffff;
            --secondary: #666666;
            --glass: rgba(255, 255, 255, 0.4);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: var(--accent);
            font-family: "Inter", -apple-system, sans-serif;
            overflow-x: hidden;
            letter-spacing: -0.02em;
        }

        /* 1. STREET VIEW LAYER (Behind everything) */
        #parallax-bg {
            position: fixed;
            inset: 0;
            z-index: 1;
            overflow: hidden;
            background: #e2e8f0;
        }

        .street-view-img {
            position: absolute;
            width: 120%; height: 120%;
            top: -10%; left: -10%;
            object-fit: cover;
            /* Placeholder gradient until you link your images */
            background: radial-gradient(circle at center, #cbd5e1 0%, #ffffff 100%);
            transition: transform 0.1s linear;
        }

        /* 2. THE FLOATING T-SHIRT CONTAINER
           We animate the DIV, not the model, so rotation stays perfect. */
        .model-container {
            position: fixed;
            inset: 0;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none; /* Mouse passes through to the model-viewer */
            animation: floatingBob 5s ease-in-out infinite;
        }

        @keyframes floatingBob {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        model-viewer {
            width: 100%;
            height: 100%;
            outline: none;
            pointer-events: auto; /* Enable touch/click for the shirt only */
            --poster-color: transparent;
        }

        /* 3. APPLE LIQUID GLASS UI */
        .interface {
            position: fixed;
            inset: 0;
            padding: 40px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            z-index: 100;
        }

        .bottom-ui {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: auto;
        }

        .cta-button {
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            color: black;
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 18px 45px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .cta-button:hover {
            background: rgba(255, 255, 255, 0.7);
            transform: scale(1.05);
        }

        .header-container {
            position: fixed; top: 40px; width: 100%;
            display: flex; justify-content: center;
            z-index: 9999; pointer-events: none;
        }

        /* 4. SCROLL DEPTH ENGINE */
        #scroll-engine {
            height: 500vh; /* Plenty of room to zoom into Tokyo */
        }
    </style>
</head>
<body>

    <div id="parallax-bg">
        <div id="street-img" class="street-view-img"></div>
    </div>

    <header class="header-container">
        <div class="brand-id" style="font-weight:800; pointer-events:auto; font-size: 12px; letter-spacing: 0.5em;">COTA // LAB</div>
    </header>

    <div class="model-container">
        <model-viewer 
            id="main-viewer"
            src="Tshirt.glb" 
            scale="0.8 0.8 0.8"
            auto-rotate 
            camera-controls
            disable-zoom
            disable-pan
            shadow-intensity="0.5" 
            exposure="1"
            camera-orbit="0deg 75deg 105%"
            touch-action="pan-y">
        </model-viewer>
    </div>

    <div class="interface">
        <div class="bottom-ui">
            <div class="product-info">
                <h1 style="font-size: 38px; text-transform:uppercase; margin:0; font-weight: 900;">Archive 001</h1>
                <p style="color:var(--secondary); font-weight: 500; font-size: 14px;">SECTOR 01: TOKYO STREETS</p>
            </div>
            <div class="purchase-zone">
                <button class="cta-button">Pre-Order</button>
            </div>
        </div>
    </div>

    <div id="scroll-engine"></div>

    <script>
        const streetImg = document.querySelector('#street-img');

        // Simple Parallax Zoom
        window.addEventListener('scroll', () => {
            const scrollHeight = document.body.scrollHeight - window.innerHeight;
            const scrollPercent = window.scrollY / scrollHeight;
            
            // Zoom background from 1.0 to 1.8 for that "walking forward" depth
            const zoom = 1 + (scrollPercent * 0.8);
            streetImg.style.transform = `scale(${zoom})`;
        });
    </script>
</body>
</html>
