<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COTA LAB // ARCHIVE</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { --bg: #000; --glass: rgba(255, 255, 255, 0.03); }
        body, html { margin: 0; padding: 0; background: var(--bg); font-family: "Inter", sans-serif; color: white; overflow-x: hidden; }

        /* PRELOADER */
        #preloader { position: absolute; width: 0; height: 0; overflow: hidden; opacity: 0; }

        header { position: fixed; top: 0; width: 100%; display: flex; justify-content: center; padding: 25px 0; z-index: 100; pointer-events: none; }
        .logo { font-weight: 900; font-size: 1.1rem; letter-spacing: 0.9em; text-transform: uppercase; margin-right: -0.9em; }

        /* SEGMENT 1: STREET VIEW (150vh) */
        .section-clt {
            position: relative;
            height: 150vh; 
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #parallax-bg {
            position: absolute; inset: 0; z-index: 1;
            background-size: cover; background-position: center;
            background-repeat: no-repeat;
            will-change: background-image;
        }
        #parallax-bg::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent 20%, transparent 80%, rgba(0,0,0,1));
        }

        /* STICKY MODEL AREA */
        .sticky-wrap {
            position: sticky; top: 0; height: 100vh; width: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10;
        }
        model-viewer { width: 100vw; height: 70vh; outline: none; }

        .slider-wrap { width: 220px; margin-top: -40px; text-align: center; z-index: 50; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; cursor: ew-resize; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 1px; background: rgba(255,255,255,0.3); }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: #fff; margin-top: -5.5px; }

        /* PRODUCT CARD & NEXT SEGMENT */
        .content-stack {
            position: relative; z-index: 20;
            width: 100%; display: flex; flex-direction: column; align-items: center;
            background: var(--bg); /* Cover for the next section */
        }

        .liquid-glass {
            width: 90%; max-width: 410px; margin: -5vh 0 100px 0; padding: 30px;
            border-radius: 26px; background: var(--glass);
            backdrop-filter: blur(50px) saturate(160%); -webkit-backdrop-filter: blur(50px) saturate(160%);
            border: 1px solid rgba(255,255,255,0.08); box-sizing: border-box;
        }

        .next-segment {
            height: 100vh; width: 100%;
            display: flex; align-items: center; justify-content: center;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        /* TEXT STYLES */
        .glass-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
        h1 { font-size: 24px; font-weight: 900; margin: 0; }
        .price { font-family: monospace; opacity: 0.4; }
        .desc { font-size: 13px; opacity: 0.4; line-height: 1.6; margin-bottom: 30px; }
        .buy-btn { width: 100%; padding: 20px; background: white; color: black; border: none; border-radius: 14px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body>

    <div id="preloader"></div>
    <header><div class="logo">Cota Lab</div></header>

    <section class="section-clt">
        <div id="parallax-bg"></div>
        <div class="sticky-wrap">
            <model-viewer id="shirt" src="Tshirt.glb" camera-orbit="0deg 75deg 105%" auto-rotate interaction-prompt="none" touch-action="none"></model-viewer>
            <div class="slider-wrap">
                <input type="range" id="rot" min="-180" max="180" value="0">
            </div>
        </div>
    </section>

    <div class="content-stack">
        <div class="liquid-glass">
            <div class="glass-header">
                <h1>CLT // ARCHIVE</h1>
                <span class="price">$54.00</span>
            </div>
            <p class="desc">Heavyweight digital-to-physical garment. Capturing pixel-mapped cloud architecture.</p>
            <button class="buy-btn">Acquire Archive</button>
        </div>

        <div class="next-segment">
            <h2 style="letter-spacing: 10px; opacity: 0.2;">NEXT SEGMENT LAYER</h2>
        </div>
    </div>

    <script>
        const bg = document.getElementById('parallax-bg');
        const shirt = document.getElementById('shirt');
        const slider = document.getElementById('rot');
        const preloader = document.getElementById('preloader');
        
        const frames = ['street-view.jpg', 'street-view 1.jpg', 'street-view 2.jpg', 'street-view 3.jpg', 'street-view 4.jpg', 'street-view 5.jpg'];

        // PRELOAD
        frames.forEach(src => {
            const img = new Image(); img.src = src; preloader.appendChild(img);
        });

        // 150vh SCRUB LOGIC
        const scrubLimit = window.innerHeight * 0.5; // Finished by 50vh to feel fast
        window.addEventListener('scroll', () => {
            const scrollY = window.pageYOffset;
            const progress = Math.min(scrollY / scrubLimit, 1);
            const frameIdx = Math.floor(progress * (frames.length - 1));
            
            const targetBg = `url('${frames[frameIdx]}')`;
            if (bg.style.backgroundImage !== targetBg) {
                bg.style.backgroundImage = targetBg;
            }
        });
        bg.style.backgroundImage = `url('${frames[0]}')`;

        // TEXTURE
        shirt.addEventListener('load', () => {
            const material = shirt.model.materials[0];
            const applyTex = async () => {
                const tex = await shirt.createTexture('cota_cloud_pixelart.png');
                if (material.pbrMetallicRoughness.baseColorTexture) {
                    material.pbrMetallicRoughness.baseColorTexture.setTexture(tex);
                }
            };
            applyTex();
        });

        // SLIDER
        slider.addEventListener('input', (e) => {
            shirt.removeAttribute('auto-rotate');
            shirt.cameraOrbit = `${e.target.value}deg 75deg 105%`;
        });
    </script>
</body>
</html>
