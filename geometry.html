<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cota Lab // Archive 001</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        :root { 
            --accent: #000000;
            --bg: #ffffff;
            --glass: rgba(255, 255, 255, 0.4);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            font-family: "Inter", sans-serif;
            overflow-x: hidden;
        }

        /* 1. THE DYNAMIC BACKGROUND */
        #parallax-bg {
            position: fixed;
            inset: 0;
            z-index: 1;
            overflow: hidden;
        }

        #street-img {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            background-position: center;
            background-size: cover;
            will-change: transform, background-image;
        }

        /* 2. THE FLOATING LOOT (NO CHANGES TO SHIRT) */
        .model-container {
            position: fixed;
            inset: 0;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none; 
            animation: floatingBob 4s ease-in-out infinite;
        }

        @keyframes floatingBob {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        model-viewer {
            width: 45vw; height: 45vh;
            outline: none;
            --poster-color: transparent;
        }

        /* 3. UI LAYERS */
        .interface {
            position: fixed; inset: 0; padding: 40px;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: flex-end; z-index: 100;
        }

        .ui-wrap { pointer-events: auto; width: 100%; }

        .slider-container {
            width: 100%; margin-bottom: 30px;
            display: flex; justify-content: center;
        }

        #rotation-slider {
            -webkit-appearance: none;
            width: 100%; max-width: 400px; height: 2px;
            background: rgba(255,255,255,0.2); outline: none;
        }

        #rotation-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 40px; height: 2px;
            background: #fff; cursor: pointer;
        }

        .bottom-ui { display: flex; justify-content: space-between; align-items: flex-end; color: white; }

        .cta-button {
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            color: black; border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 16px 40px; border-radius: 50px;
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.15em; cursor: pointer;
        }

        .header-container { position: fixed; top: 40px; width: 100%; display: flex; justify-content: center; z-index: 9999; pointer-events: none; color: white;}

        #scroll-engine { height: 600vh; } /* 100vh per image roughly */
    </style>
</head>
<body>

    <div id="parallax-bg">
        <div id="street-img"></div>
    </div>

    <header class="header-container">
        <div class="brand-id" style="font-weight:800; pointer-events:auto; font-size: 10px; letter-spacing: 0.6em;">COTA // LAB</div>
    </header>

    <div class="model-container">
        <model-viewer 
            id="main-viewer"
            src="Tshirt.glb" 
            auto-rotate 
            shadow-intensity="0.3" 
            exposure="1.1"
            camera-orbit="0deg 75deg 105%"
            style="pointer-events: none;">
        </model-viewer>
    </div>

    <div class="interface">
        <div class="ui-wrap">
            <div class="slider-container">
                <input type="range" id="rotation-slider" min="0" max="360" value="0">
            </div>

            <div class="bottom-ui">
                <div class="product-info">
                    <h1 style="font-size: 32px; text-transform:uppercase; margin:0; font-weight: 900; letter-spacing: -0.04em;">Archive 001</h1>
                    <p style="color:rgba(255,255,255,0.6); font-size: 12px; letter-spacing: 0.1em; margin-top: 4px;">SECTOR: CLT // APPROACHING</p>
                </div>
                <div class="purchase-zone">
                    <button class="cta-button">Pre-Order</button>
                </div>
            </div>
        </div>
    </div>

    <div id="scroll-engine"></div>

    <script>
        const modelViewer = document.querySelector('#main-viewer');
        const streetImg = document.querySelector('#street-img');
        const slider = document.querySelector('#rotation-slider');

        // 1. Image sequence configuration
        const images = [
            'street-view.jpg',
            'street-view1.jpg',
            'street-view2.jpg',
            'street-view3.jpg',
            'street-view4.jpg',
            'street-view5.jpg'
        ];

        // Preload images to prevent flickering
        images.forEach(src => {
            const img = new Image();
            img.src = src;
        });

        // 2. Slider Logic
        slider.addEventListener('input', (e) => {
            modelViewer.cameraOrbit = `${e.target.value}deg 75deg 105%`;
            modelViewer.autoRotate = false;
        });

        // 3. The Walk-Through Engine
        window.addEventListener('scroll', () => {
            const scrollPercent = window.scrollY / (document.body.scrollHeight - window.innerHeight);
            
            // Calculate which image to show (0 to 5)
            const frameIndex = Math.min(
                images.length - 1,
                Math.floor(scrollPercent * images.length)
            );

            // Update the background image
            streetImg.style.backgroundImage = `url('${images[frameIndex]}')`;

            // Optional: Internal zoom per frame to smooth the jump
            const internalZoom = 1 + ((scrollPercent * images.length % 1) * 0.05);
            streetImg.style.transform = `scale(${internalZoom})`;
        });

        // Initialize first frame
        streetImg.style.backgroundImage = `url('${images[0]}')`;
    </script>
</body>
</html>
