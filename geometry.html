<!DOCTYPE html>
<html lang="en" style="background:#000!important;background-color:#000!important">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cota // Lab Archives</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        :root {
          --desktop-price-top: 25vh;
          --desktop-desc-top: 45vh;
          --desktop-panels-right: 10vw;
          --desktop-panel-width: 350px;
        }

        html, body {
          background: #000 !important;
          margin: 0;
          padding: 0;
          overflow: hidden;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #root { width: 100vw; height: 100vh; position: relative; }

        /* 2. The 3D Shirt Container */
        model-viewer {
          width: 100%;
          height: 100vh;
          background-color: #000;
          --poster-color: transparent;
        }

        .glass-panel {
          background: linear-gradient(135deg, rgba(255, 255, 255, 0.18) 0%, rgba(255, 255, 255, 0.12) 50%);
          backdrop-filter: blur(40px) saturate(180%);
          border: 1px solid rgba(255, 255, 255, 0.35);
          border-radius: 24px;
          padding: 20px;
          position: fixed;
          z-index: 10;
          width: var(--desktop-panel-width);
          color: white;
        }

        .price-panel { top: var(--desktop-price-top); right: var(--desktop-panels-right); }
        .description-panel { top: var(--desktop-desc-top); right: var(--desktop-panels-right); }

        .buy-button {
          background: linear-gradient(135deg, #22C55E 0%, #16A34A 100%);
          color: white;
          border: none;
          border-radius: 16px;
          padding: 14px;
          width: 100%;
          font-weight: 700;
          cursor: pointer;
          margin-top: 10px;
        }

        .back-hub {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            color: #4ade80;
            text-decoration: none;
            font-family: monospace;
            font-size: 12px;
            z-index: 20;
        }
    </style>
</head>
<body>

    <div id="root">
        <model-viewer 
            src="Tshirt.glb" 
    alt="Cota 3D Shirt"
    auto-rotate 
    camera-controls
    disable-zoom
    disable-pan
    shadow-intensity="2" 
    shadow-softness="1"
    camera-orbit="0deg 75deg 105%"
    min-camera-orbit="auto 75deg auto"
    max-camera-orbit="auto 75deg auto"
    min-field-of-view="25deg"
    interpolation-decay="200"
    touch-action="none"
    style="width: 100%; height: 100vh; background: #000;">
        </model-viewer>

        <div class="glass-panel price-panel">
            <div style="text-align: center;">
                <h1 style="font-size: 2.5rem; margin: 0;">$299.99</h1>
                <button class="buy-button">Buy Now</button>
            </div>
        </div>

        <div class="glass-panel description-panel">
            <h2>Cota // 001</h2>
            <p style="font-size: 0.9rem; opacity: 0.8;">Geometric product design and structural clothing experiments.</p>
        </div>

        <a href="index.html" class="back-hub">>> RETURN_TO_HUB</a>
    </div>

</body>
</html>>
