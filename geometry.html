<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cota Lab // Archive 001</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        :root { 
            --accent: #ffffff;
            --bg: #000000;
            --secondary: #666666;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: var(--accent);
            font-family: "Inter", -apple-system, sans-serif;
            overflow: hidden;
            letter-spacing: -0.02em;
        }

        /* 1. THE BASEMENT (Background + Grain) */
        #root {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #111 0%, #000 70%);
            z-index: 1;
        }

        .grain-overlay {
            position: fixed;
            inset: 0;
            opacity: 0.05;
            pointer-events: none;
            z-index: 2; /* Sit behind the model */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* 2. THE STAGE (3D Model) */
        model-viewer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            --poster-color: transparent;
            exposure: 1.2;
            z-index: 3; /* Sit in front of grain */
        }

        /* 3. THE GLASS (UI / Navigation) */
        .top-nav {
            position: fixed;
            top: 40px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 40px;
            z-index: 9999;
            pointer-events: auto;
        }

        .nav-link {
            color: var(--secondary);
            text-decoration: none;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: color 0.3s ease;
        }

        .nav-link.active, .nav-link:hover { color: var(--accent); }

        .interface {
            position: fixed;
            inset: 0;
            padding: 40px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 100; /* UI layer */
        }

        .brand-id {
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        .bottom-ui {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: auto;
        }

        .product-info { max-width: 380px; }

        .product-title {
            font-size: 32px;
            font-weight: 300;
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }

        .product-description {
            font-size: 12px;
            line-height: 1.6;
            color: var(--secondary);
            margin: 0;
        }

        .price {
            display: block;
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .cta-button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 18px 48px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .top-nav { top: 25px; gap: 20px; }
            .nav-link { font-size: 8px; }
            .bottom-ui { flex-direction: column; align-items: flex-start; }
            .purchase-zone { width: 100%; text-align: left; margin-top: 30px; }
            .cta-button { width: 100%; }
            .interface { padding: 25px; }
        }
    </style>
</head>
<body>

    <div id="root">
        <div class="grain-overlay"></div>

        <model-viewer 
            src="Tshirt.glb" 
            alt="Cota Lab Product"
            auto-rotate 
            camera-controls
            disable-zoom
            disable-pan
            shadow-intensity="1.5" 
            shadow-softness="1"
            camera-orbit="0deg 75deg 105%"
            min-camera-orbit="auto 75deg auto"
            max-camera-orbit="auto 75deg auto"
            touch-action="none">
        </model-viewer>

        <nav class="top-nav">
            <a href="#" class="nav-link" onclick="return false;">Home</a>
            <a href="shadowmarket.html" class="nav-link active">Blackmarket</a>
            <a href="about.html" class="nav-link">About</a>
            <a href="legal.html" class="nav-link">Legal</a>
        </nav>

        <div class="interface">
            <div class="top-bar">
                <div class="brand-id">COTA // LAB</div>
            </div>

            <div class="bottom-ui">
                <div class="product-info">
                    <h1 class="product-title">T-Shirt</h1>
                    <p class="product-description">
                        Acquiring this piece directly funds the acquisition of in-house screen printing hardware—intentionally bypassing third-party drop shipping. Edition limited to archive availability.
                    </p>
                </div>

                <div class="purchase-zone">
                    <span class="price">$1.81</span>
                    <button class="cta-button">Acquire</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
