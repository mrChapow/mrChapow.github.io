<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cota Lab // Archive 001</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        :root { 
            --accent: #ffffff;
            --bg: #000000;
            --secondary: #666666;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: var(--accent);
            font-family: "Inter", -apple-system, sans-serif;
            overflow: hidden;
            letter-spacing: -0.02em;
        }

        #root {
            position: relative;
            width: 100vw;
            height: 100vh;
            /* Subtle radial vignette to create depth behind the shirt */
            background: radial-gradient(circle at center, #111 0%, #000 70%);
        }

        model-viewer {
            width: 100%;
            height: 100%;
            --poster-color: transparent;
            /* Boosted exposure for a "studio lighting" look */
            exposure: 1.2;
        }

        /* The Minimalist Information Overlay */
        .interface {
            position: fixed;
            inset: 0;
            padding: 40px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .brand-id {
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        .product-meta {
            text-align: right;
            font-family: monospace;
            font-size: 10px;
            color: var(--secondary);
            text-transform: uppercase;
        }

        .bottom-ui {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: auto;
        }

        .product-info {
            max-width: 300px;
        }

        .product-title {
            font-size: 32px;
            font-weight: 300;
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }

        .product-description {
            font-size: 12px;
            line-height: 1.6;
            color: var(--secondary);
            margin: 0;
        }

        .purchase-zone {
            text-align: right;
        }

        .price {
            display: block;
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .cta-button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 18px 48px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .cta-button:hover {
            opacity: 0.8;
        }

        .back-nav {
            position: fixed;
            top: 50%;
            left: 40px;
            transform: translateY(-50%) rotate(-90deg);
            transform-origin: left;
            font-size: 10px;
            text-decoration: none;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            pointer-events: auto;
        }

        /* Mobile Layout */
        @media (max-width: 768px) {
            .interface { padding: 25px; }
            .bottom-ui { flex-direction: column; align-items: flex-start; }
            .purchase-zone { width: 100%; text-align: left; margin-top: 30px; }
            .cta-button { width: 100%; }
            .back-nav { display: none; }
            .product-title { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div id="root">
        <model-viewer 
            src="Tshirt.glb" 
            alt="Cota Lab Archive 001"
            auto-rotate 
            camera-controls
            disable-zoom
            disable-pan
            shadow-intensity="1" 
            shadow-softness="1"
            camera-orbit="0deg 75deg 105%"
            min-camera-orbit="auto 75deg auto"
            max-camera-orbit="auto 75deg auto"
            touch-action="none">
        </model-viewer>

        <a href="index.html" class="back-nav">Back to Lab</a>

        <div class="interface">
            <div class="top-bar">
                <div class="brand-id">COTA // LAB</div>
                <div class="product-meta">
                    Object: 001-A<br>
                    State: Experimental<br>
                    Format: 1.15MB_Mesh
                </div>
            </div>

            <div class="bottom-ui">
                <div class="product-info">
                    <h1 class="product-title">T-Shirt</h1>
                    <p class="product-description">
                        A study in structural geometry and fabric tension. Designed for the maker community. Edition limited to archive availability.
                    </p>
                </div>

                <div class="purchase-zone">
                    <span class="price">$299.99</span>
                    <button class="cta-button">Acquire</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
