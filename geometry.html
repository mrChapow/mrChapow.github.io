<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cota // Lab Archives</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        :root { --accent-green: #22C55E; }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; /* Prevents messy scrolling */
        }

        #root {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* The 3D Viewer */
        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #000;
        }

        /* Glass Sidebar */
        .product-sidebar {
            position: fixed;
            z-index: 100;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2rem;
            
            /* Desktop placement */
            top: 50%;
            right: 5vw;
            transform: translateY(-50%);
            width: 350px;
        }

        .product-name {
            font-size: 2.5rem;
            font-weight: 900;
            margin: 0 0 0.5rem 0;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .product-desc {
            font-family: monospace;
            font-size: 0.8rem;
            opacity: 0.6;
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        .add-to-cart {
            background: #fff;
            color: #000;
            width: 100%;
            padding: 1rem;
            border-radius: 50px;
            border: none;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .add-to-cart:hover {
            background: var(--accent-green);
        }

        .back-hub {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: var(--accent-green);
            text-decoration: none;
            font-family: monospace;
            font-size: 10px;
            z-index: 200;
        }

        /* Mobile specific adjustments */
        @media (max-width: 768px) {
            .product-sidebar {
                top: auto;
                bottom: 5vh;
                right: 5vw;
                left: 5vw;
                width: auto;
                transform: none;
            }
            model-viewer {
                height: 70%; /* Move shirt up on mobile */
            }
        }
    </style>
</head>
<body>

    <div id="root">
        <model-viewer 
            src="Tshirt.glb" 
            alt="Cota 3D Shirt"
            auto-rotate 
            camera-controls
            disable-zoom
            disable-pan
            shadow-intensity="1" 
            camera-orbit="0deg 75deg 105%"
            touch-action="none">
        </model-viewer>

        <div class="product-sidebar">
            <h1 class="product-name">T-Shirt</h1>
            <p class="product-desc">
                GEOMETRIC PRODUCT DESIGN 001. <br>
                HIGH-FIDELITY STRUCTURE EXPLORATION. <br>
                COTA LAB ARCHIVE.
            </p>
            <div style="font-weight: bold; margin-bottom: 1rem;">$299.99</div>
            <button class="add-to-cart">Add to Cart</button>
        </div>

        <a href="index.html" class="back-hub">>> RETURN_TO_HUB</a>
    </div>

</body>
</html>
