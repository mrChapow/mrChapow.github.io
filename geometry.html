<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COTA LAB // ARCHIVE 001</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { --bg: #000; --text: #fff; --border: rgba(255, 255, 255, 0.1); }
        
        body, html { margin: 0; padding: 0; background: var(--bg); font-family: "Inter", sans-serif; color: var(--text); overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        * { box-sizing: border-box; }

        /* --- NAV --- */
        .site-nav {
            position: fixed; top: 0; width: 100%; height: 70px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; z-index: 1000;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        .logo { font-weight: 900; font-size: 1.1rem; letter-spacing: 0.7em; text-transform: uppercase; margin-right: -0.7em; }
        .nav-link { font-size: 10px; font-weight: 700; text-transform: uppercase; opacity: 0.5; letter-spacing: 0.1em; }

        /* --- BACKGROUND ENGINE --- */
        .archive-stage { position: relative; height: 220vh; width: 100%; }
        
        .interface-lock {
            position: sticky; top: 0;
            height: 100vh; width: 100%;
            display: flex; flex-direction: column; overflow: hidden;
        }

        #parallax-bg {
            position: absolute; inset: 0; z-index: 1;
            background-size: cover; background-position: center;
            background-repeat: no-repeat;
            background-image: url('street-view.jpg');
        }
        #parallax-bg::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to right, rgba(0,0,0,0.4), rgba(0,0,0,0.85));
        }

        /* --- THE CONTENT GRID --- */
        #product-content {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            width: 100%; height: 100%;
            /* This creates the "Half-Inch" start. Change 40vh to 20vh if it's too deep. */
            padding-top: 40vh; 
            will-change: transform;
        }

        .model-col { 
            width: 100%; height: 40vh; 
            display: flex; flex-direction: column; align-items: center;
        }
        model-viewer { width: 100%; height: 100%; outline: none; }

        /* Restored Slider */
        .slider-wrap { width: 180px; margin-top: 10px; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 1px; background: rgba(255,255,255,0.3); }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 10px; width: 10px; border-radius: 50%; background: #fff; margin-top: -4.5px; }

        /* Typography */
        .info-col {
            width: 100%; max-width: 400px;
            padding: 40px 25px; text-align: center;
        }
        h1 { font-size: 24px; font-weight: 900; text-transform: uppercase; margin: 0; letter-spacing: -0.02em; }
        .price { font-family: monospace; font-size: 15px; opacity: 0.5; display: block; margin: 8px 0 20px; }
        .desc { font-size: 12px; opacity: 0.4; line-height: 1.7; margin-bottom: 30px; }
        
        .buy-btn { 
            width: 100%; padding: 18px; background: white; color: black; 
            border: none; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em;
        }

        /* DESKTOP SPLIT RE-STABILIZED */
        @media (min-width: 1024px) {
            #product-content { flex-direction: row; justify-content: space-around; padding: 15vh 8vw 0; }
            .model-col { width: 55%; height: 75vh; }
            .info-col { width: 35%; text-align: left; padding: 0; }
        }

        .scene-transition { height: 100vh; background: #000; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

    <nav class="site-nav">
        <div class="nav-link">Archive</div>
        <div class="logo">Cota Lab</div>
        <div class="nav-link">Cart [0]</div>
    </nav>

    <section class="archive-stage" id="track">
        <div class="interface-lock">
            <div id="parallax-bg"></div>
            
            <div id="product-content">
                <div class="model-col">
                    <model-viewer id="shirt" src="Tshirt.glb" camera-orbit="0deg 75deg 105%" auto-rotate interaction-prompt="none" touch-action="none"></model-viewer>
                    <div class="slider-wrap">
                        <input type="range" id="rot" min="-180" max="180" value="0">
                    </div>
                </div>

                <aside class="info-col">
                    <h1>CLT // 001</h1>
                    <span class="price">$54.00</span>
                    <p class="desc">Engineered for the domestic grid. Heavyweight 320GSM cotton. The gap is closed.</p>
                    <button class="buy-btn">Acquire Archive</button>
                    <div style="font-family: monospace; font-size: 8px; margin-top: 30px; opacity: 0.2; letter-spacing: 0.3em;">RESTORED_V4.9</div>
                </aside>
            </div>
        </div>
    </section>

    <div class="scene-transition"></div>

    <script>
        const bg = document.getElementById('parallax-bg');
        const content = document.getElementById('product-content');
        const track = document.getElementById('track');
        const shirt = document.getElementById('shirt');
        const slider = document.getElementById('rot');

        const frames = ['street-view.jpg', 'street-view 1.jpg', 'street-view 2.jpg', 'street-view 3.jpg', 'street-view 4.jpg', 'street-view 5.jpg'];

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const maxScroll = track.offsetHeight - window.innerHeight;
            const progress = Math.min(Math.max(scrollY / maxScroll, 0), 1);

            // 1. BACKGROUND (Finishes at 75% of track)
            const frameProgress = Math.min(progress / 0.75, 1);
            const frameIdx = Math.floor(frameProgress * (frames.length - 1));
            bg.style.backgroundImage = `url('${frames[frameIdx]}')`;

            // 2. THE REVEAL (Moves content UP as you scroll)
            // Starts at padding-top, scrolls into view and eventually out of the top.
            const moveY = progress * 120; // Adjust this to control exit speed
            content.style.transform = `translateY(-${moveY}vh)`;
        });

        // ROTATION
        slider.addEventListener('input', (e) => {
            shirt.removeAttribute('auto-rotate');
            shirt.cameraOrbit = `${e.target.value}deg 75deg 105%`;
        });

        // TEXTURE
        shirt.addEventListener('load', () => {
            const material = shirt.model.materials[0];
            const applyTex = async () => {
                const tex = await shirt.createTexture('cota_cloud_pixelart.png');
                if (material.pbrMetallicRoughness.baseColorTexture) {
                    material.pbrMetallicRoughness.baseColorTexture.setTexture(tex);
                }
            };
            applyTex();
        });
    </script>
</body>
</html>
