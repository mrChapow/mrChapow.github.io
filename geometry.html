<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cota Lab // Archive 001</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        :root { 
            --accent: #000000;
            --bg: #ffffff;
            --secondary: #666666;
            --glass: rgba(255, 255, 255, 0.4);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: var(--accent);
            font-family: "Inter", sans-serif;
            overflow-x: hidden;
        }

        /* 1. STREET VIEW LAYER */
        #parallax-bg {
            position: fixed;
            inset: 0;
            z-index: 1;
            overflow: hidden;
            background: #e2e8f0;
        }

        .street-view-img {
            position: absolute;
            width: 120%; height: 120%;
            top: -10%; left: -10%;
            object-fit: cover;
            background: radial-gradient(circle at center, #cbd5e1 0%, #ffffff 100%);
            transition: transform 0.1s linear;
        }

        /* 2. THE FLOATING CONTAINER (Scaled down) */
        .model-container {
            position: fixed;
            inset: 0;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none; 
            /* THE BOB: Slightly faster, much smaller movement */
            animation: floatingBob 3s ease-in-out infinite;
        }

        @keyframes floatingBob {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        model-viewer {
            width: 100%;
            height: 100%;
            outline: none;
            pointer-events: auto;
            --poster-color: transparent;
        }

        /* 3. LIQUID GLASS UI */
        .interface {
            position: fixed;
            inset: 0;
            padding: 40px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            z-index: 100;
        }

        .bottom-ui {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: auto;
        }

        .cta-button {
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            color: black;
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            transition: all 0.4s ease;
        }

        .header-container {
            position: fixed; top: 40px; width: 100%;
            display: flex; justify-content: center;
            z-index: 9999; pointer-events: none;
        }

        #scroll-engine { height: 500vh; }
    </style>
</head>
<body>

    <div id="parallax-bg">
        <div id="street-img" class="street-view-img"></div>
    </div>

    <header class="header-container">
        <div class="brand-id" style="font-weight:800; pointer-events:auto; font-size: 10px; letter-spacing: 0.6em;">COTA // LAB</div>
    </header>

    <div class="model-container">
        <model-viewer 
            id="main-viewer"
            src="Tshirt.glb" 
            scale="0.5 0.5 0.5" 
            auto-rotate 
            camera-controls
            disable-zoom
            disable-pan
            shadow-intensity="0.3" 
            exposure="1.1"
            camera-orbit="0deg 75deg 105%"
            touch-action="pan-y">
        </model-viewer>
    </div>

    <div class="interface">
        <div class="bottom-ui">
            <div class="product-info">
                <h1 style="font-size: 32px; text-transform:uppercase; margin:0; font-weight: 900; letter-spacing: -0.04em;">Archive 001</h1>
                <p style="color:var(--secondary); font-size: 12px; letter-spacing: 0.1em; margin-top: 4px;">TOKYO // CHUO CITY</p>
            </div>
            <div class="purchase-zone">
                <button class="cta-button">Pre-Order</button>
            </div>
        </div>
    </div>

    <div id="scroll-engine"></div>

    <script>
        const streetImg = document.querySelector('#street-img');
        window.addEventListener('scroll', () => {
            const scrollPercent = window.scrollY / (document.body.scrollHeight - window.innerHeight);
            const zoom = 1 + (scrollPercent * 0.7);
            streetImg.style.transform = `scale(${zoom})`;
        });
    </script>
</body>
</html>
