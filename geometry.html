<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COTA LAB // ITEM 001</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { 
            --bg: #000; 
            --text: #fff; 
            --dim: rgba(255,255,255,0.4); 
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }
        
        body, html { margin: 0; padding: 0; background: var(--bg); font-family: "Inter", sans-serif; color: var(--text); overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        * { box-sizing: border-box; }

        /* --- NAVIGATION --- */
        .site-nav {
            position: fixed; top: 0; width: 100%; height: 70px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; z-index: 1000;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }
        .logo { font-weight: 900; font-size: 1rem; letter-spacing: 0.8em; text-transform: uppercase; margin-right: -0.8em; }
        .nav-link { font-size: 10px; font-weight: 800; text-transform: uppercase; opacity: 0.5; letter-spacing: 0.2em; cursor: pointer; }

        /* --- SCROLL TRACK (1.5 Pages) --- */
        .scroll-track { position: relative; height: 150vh; width: 100%; }
        
        .sticky-pane {
            position: sticky; top: 0;
            height: 100vh; width: 100%;
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        #bg-sequence {
            position: absolute; inset: 0; z-index: 1;
            background-size: cover; background-position: center;
            background-repeat: no-repeat;
            background-image: url('street-view.jpg');
        }
        #bg-sequence::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 100%);
        }

        /* --- UI PANEL --- */
        .static-ui {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center;
            height: 100vh; width: 100%;
            padding: 20px;
        }

        .model-wrap { 
            width: 100%; height: 45vh; 
            display: flex; flex-direction: column; align-items: center; 
            margin-bottom: 20px;
        }
        model-viewer { width: 100%; height: 100%; outline: none; --poster-color: transparent; }

        .info-panel {
            width: 100%; max-width: 380px;
            padding: 30px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 2px;
            text-align: left;
        }

        h1 { font-size: 20px; font-weight: 900; text-transform: uppercase; margin: 0; letter-spacing: 2px; }
        .price { font-family: monospace; font-size: 13px; color: var(--dim); display: block; margin: 8px 0 20px; }
        
        .section-label { font-family: monospace; font-size: 9px; text-transform: uppercase; color: var(--dim); margin-bottom: 12px; display: block; letter-spacing: 2px; }
        
        .size-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 25px; }
        .size-btn { 
            background: transparent; border: 1px solid var(--border); color: #fff; 
            padding: 12px 0; font-size: 10px; font-family: monospace; cursor: pointer; transition: all 0.3s;
        }
        .size-btn:hover { border-color: var(--dim); }
        .size-btn.active { border-color: #fff; background: #fff; color: #000; }

        .action-container { display: flex; flex-direction: column; gap: 10px; }
        .buy-btn { 
            width: 100%; padding: 16px; border: 1px solid #fff; 
            background: transparent; color: #fff; font-weight: 900; 
            text-transform: uppercase; cursor: pointer; letter-spacing: 0.1em; 
            font-size: 12px; transition: 0.3s;
        }
        .buy-btn:hover { background: #fff; color: #000; }
        
        #checkout-trigger { background: #fff; color: #000; display: none; }

        /* --- DESKTOP ADAPTATION --- */
        @media (min-width: 1024px) {
            .static-ui { flex-direction: row; justify-content: center; gap: 80px; padding: 0 5vw; }
            .model-wrap { width: 45%; height: 75vh; margin-bottom: 0; }
            .info-panel { width: 350px; }
        }

        .footer-scene { height: 50vh; background: #000; display: flex; align-items: center; justify-content: center; border-top: 1px solid var(--border); }
        .status-tag { font-family: monospace; font-size: 9px; color: var(--dim); letter-spacing: 0.3em; }
    </style>
</head>
<body>

    <nav class="site-nav">
        <div class="nav-link">Collection 01</div>
        <div class="logo">Cota Lab</div>
        <div class="nav-link" id="cart-count">Cart (0)</div>
    </nav>

    <div class="scroll-track" id="master-track">
        <div class="sticky-pane">
            <div id="bg-sequence"></div>
            
            <div class="static-ui">
                <div class="model-wrap">
                    <model-viewer id="shirt" 
                        src="Tshirt.glb" 
                        camera-orbit="0deg 75deg 105%" 
                        auto-rotate 
                        rotation-speed="0.5"
                        camera-controls 
                        touch-action="pan-y"
                        interaction-prompt="auto"
                        enable-pan="false"
                        min-camera-orbit="auto 65deg 80%"
                        max-camera-orbit="auto 95deg 130%"
                        interpolation-decay="200"
                        shadow-intensity="1">
                    </model-viewer>
                </div>

                <div class="info-panel">
                    <h1>CLT // ITEM 001</h1>
                    <span class="price">$54.00 USD</span>
                    
                    <span class="section-label">Geometry Selection</span>
                    <div class="size-grid">
                        <button class="size-btn" data-id="price_S">S</button>
                        <button class="size-btn" data-id="price_M">M</button>
                        <button class="size-btn" data-id="price_L">L</button>
                        <button class="size-btn" data-id="price_XL">XL</button>
                    </div>

                    <div class="action-container">
                        <button class="buy-btn" id="add-to-cart">Add to Cart</button>
                        <button class="buy-btn" id="checkout-trigger">Review & Checkout</button>
                    </div>
                    
                    <div class="status-tag" style="margin-top: 30px;">
                        V7.0 // PAYMENTS_READY // PERSISTENT_SESSION
                    </div>
                </div>
            </div>
        </div>
    </div>

    <section class="footer-scene">
        <div class="status-tag">COTA LAB 2026 // ALL RIGHTS RESERVED</div>
    </section>

    <script>
        const bg = document.getElementById('bg-sequence');
        const track = document.getElementById('master-track');
        const shirt = document.getElementById('shirt');
        const cartCount = document.getElementById('cart-count');
        const sizeBtns = document.querySelectorAll('.size-btn');
        const addBtn = document.getElementById('add-to-cart');
        const payBtn = document.getElementById('checkout-trigger');

        let cart = [];
        let resetTimer;

        // --- SIZE SELECTION ---
        sizeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                sizeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        // --- CART ACTION ---
        addBtn.addEventListener('click', () => {
            const activeSize = document.querySelector('.size-btn.active');
            if(!activeSize) {
                alert("SPECIFY GEOMETRY (SIZE) TO CONTINUE");
                return;
            }

            const priceId = activeSize.dataset.id;
            const existing = cart.find(i => i.price === priceId);
            
            if(existing) {
                existing.quantity += 1;
            } else {
                cart.push({ price: priceId, quantity: 1 });
            }

            const total = cart.reduce((sum, i) => sum + i.quantity, 0);
            cartCount.innerText = `Cart (${total})`;
            payBtn.style.display = "block";
            
            addBtn.innerText = "Confirmed";
            setTimeout(() => { addBtn.innerText = "Add to Cart"; }, 800);
        });

        // --- CAMERA RESET LOGIC ---
        const resetCamera = () => {
            shirt.cameraOrbit = "0deg 75deg 105%";
        };

        shirt.addEventListener('interaction-set', () => {
            clearTimeout(resetTimer);
            resetTimer = setTimeout(resetCamera, 5000); // Reset after 5s of no touch
        });

        // --- SCROLL ANIMATION ---
        const frames = ['street-view.jpg', 'street-view 1.jpg', 'street-view 2.jpg', 'street-view 3.jpg', 'street-view 4.jpg', 'street-view 5.jpg'];
        
        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const trackHeight = track.offsetHeight;
            const viewHeight = window.innerHeight;
            const progress = Math.min(Math.max(scrollY / (trackHeight - viewHeight), 0), 1);
            const frameIdx = Math.floor(progress * (frames.length - 1));
            bg.style.backgroundImage = `url('${frames[frameIdx]}')`;
        });

        // Texture Loading
        shirt.addEventListener('load', () => {
            const material = shirt.model.materials[0];
            const applyTex = async () => {
                const tex = await shirt.createTexture('cota_cloud_pixelart.png');
                if (material.pbrMetallicRoughness.baseColorTexture) {
                    material.pbrMetallicRoughness.baseColorTexture.setTexture(tex);
                }
            };
            applyTex();
        });
        
        payBtn.addEventListener('click', () => {
            alert("Redirecting to Stripe secure checkout...");
        });
    </script>
</body>
</html>
