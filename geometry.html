<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cota Lab // Hybrid</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { --bg: #000; --glass: rgba(255, 255, 255, 0.05); }
        body, html { margin: 0; padding: 0; background: var(--bg); font-family: "Inter", sans-serif; color: white; }

        /* FIXED BACKGROUND & MODEL */
        #parallax-bg {
            position: fixed; inset: 0; z-index: 1;
            background-size: cover; background-position: center;
            will-change: background-image;
        }

        .viewer-viewport {
            position: fixed; top: 0; width: 100%; height: 60vh;
            display: flex; align-items: center; justify-content: center;
            z-index: 10; pointer-events: none;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.4s ease;
        }

        model-viewer { width: 80vw; height: 50vh; outline: none; }

        /* PRODUCT SECTIONS */
        .product-section {
            position: relative; height: 200vh; /* Length of the "Scene Play" */
            z-index: 20;
        }

        .details-panel {
            margin-top: 120vh; /* Wait for animation to play before showing info */
            background: linear-gradient(to top, black 80%, transparent);
            padding: 60px 30px;
            position: relative;
            min-height: 80vh;
        }

        .ui-card {
            max-width: 500px; margin: 0 auto;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            padding: 40px; border-radius: 24px;
        }

        h1 { font-size: 42px; text-transform: uppercase; margin: 0 0 10px 0; font-weight: 900; }
        .price { font-size: 20px; opacity: 0.6; margin-bottom: 30px; }
        
        .buy-btn {
            width: 100%; background: white; color: black; border: none;
            padding: 20px; border-radius: 50px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer;
        }

        /* SCENE INDICATOR */
        .scene-nav {
            position: fixed; right: 30px; top: 50%; transform: translateY(-50%);
            z-index: 100; display: flex; flex-direction: column; gap: 15px;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: 0.3s; }
        .dot.active { background: white; transform: scale(1.5); }
    </style>
</head>
<body>

    <div id="parallax-bg"></div>

    <div class="viewer-viewport" id="viewport">
        <model-viewer id="viewer" src="Tshirt.glb" camera-orbit="0deg 75deg 105%" exposure="1.1"></model-viewer>
    </div>

    <section class="product-section" id="scene-0">
        <div class="details-panel">
            <div class="ui-card">
                <h1>CLT Archive</h1>
                <div class="price">$45.00</div>
                <p>Heavyweight cotton construction with pixel-art cloud mapping. Part of the first drop.</p>
                <button class="buy-btn">Add to Cart</button>
            </div>
        </div>
    </section>

    <section class="product-section" id="scene-1">
        <div class="details-panel">
            <div class="ui-card">
                <h1>Furry Core</h1>
                <div class="price">$50.00</div>
                <p>Deep texture map integration. A shift in tactile digital design.</p>
                <button class="buy-btn">Add to Cart</button>
            </div>
        </div>
    </section>

    <script>
        const bg = document.getElementById('parallax-bg');
        const viewer = document.getElementById('viewer');
        const viewport = document.getElementById('viewport');

        const world = [
            {
                texture: "cota_cloud_pixelart.png",
                images: Array.from({length: 12}, (_, i) => `burstscene${i}.png`) 
            },
            {
                texture: "lovefont.png", // Replace with 'furry' map if filename is different
                images: ['lab-view.jpg', 'lab-view 1.jpg', 'lab-view 2.jpg', 'lab-view 3.jpg']
            }
        ];

        let currentSceneIndex = 0;
        let isSpinning = false;

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const sectionHeight = document.getElementById('scene-0').offsetHeight;
            
            // Calculate Current Scene
            const sceneTarget = Math.floor(scrollY / sectionHeight);
            
            // Calculate progress WITHIN the current section (0 to 1)
            const sectionScroll = scrollY % sectionHeight;
            const progress = sectionScroll / sectionHeight;

            // 1. Play Background Frames based on scroll
            if (world[sceneTarget]) {
                const frames = world[sceneTarget].images;
                const frameIndex = Math.min(Math.floor(progress * frames.length * 1.5), frames.length - 1);
                bg.style.backgroundImage = `url('${frames[frameIndex]}')`;
            }

            // 2. Trigger Texture Swap + Spin
            if (sceneTarget !== currentSceneIndex && sceneTarget < world.length) {
                currentSceneIndex = sceneTarget;
                triggerSceneSwap(world[sceneTarget]);
            }
        });

        async function triggerSceneSwap(newScene) {
            isSpinning = true;
            
            // Visual Warp (No size change, just "vibration" and spin)
            viewport.style.filter = 'blur(10px) brightness(2)';
            
            if (viewer.model) {
                const material = viewer.model.materials[0];
                const newTexture = await viewer.createTexture(newScene.texture);
                material.pbrMetallicRoughness.baseColorTexture.setTexture(newTexture);
            }

            setTimeout(() => {
                // The Power Spin
                const currentOrbit = viewer.getCameraOrbit();
                viewer.cameraOrbit = `${currentOrbit.theta + (Math.PI * 4)}rad 75deg 105%`;
                
                viewport.style.filter = 'blur(0px) brightness(1.1)';
                setTimeout(() => { isSpinning = false; }, 800);
            }, 300);
        }
    </script>
</body>
</html>
