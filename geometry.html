<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cota Lab // Multiverse</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        :root { 
            --accent: #ffffff;
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            font-family: "Inter", sans-serif;
            overflow-x: hidden;
            color: white;
            overscroll-behavior-y: none;
        }

        /* 1. RUNWAY - Dynamically sized in JS based on Scene count */
        #scroll-engine { width: 100%; position: absolute; top: 0; left: 0; z-index: 0; }

        #parallax-bg {
            position: fixed; inset: 0; z-index: 1;
            background-size: cover; background-position: center;
            will-change: background-image; pointer-events: none;
            transition: filter 0.5s ease;
        }

        /* 2. THE LOOT */
        .model-container {
            position: fixed; inset: 0; z-index: 3;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; 
            animation: floatingBob 4s ease-in-out infinite;
        }
        @keyframes floatingBob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        model-viewer { 
            width: 50vw; height: 50vh; outline: none; 
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.4s ease;
        }

        @media (max-width: 768px) {
            model-viewer { width: 75vw; height: 60vh; }
        }

        /* 3. BRANDING & UI */
        .header {
            position: fixed; top: 40px; width: 100%;
            display: flex; justify-content: center; z-index: 100;
        }
        .brand-id { font-weight: 900; font-size: 11px; letter-spacing: 0.8em; text-transform: uppercase; }

        .interface {
            position: fixed; inset: 0; padding: 50px;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: flex-end; z-index: 100;
        }
        @media (max-width: 768px) { .interface { padding: 30px 25px; } }

        .ui-wrap { pointer-events: auto; width: 100%; max-width: 1200px; margin: 0 auto; }

        .slider-container { width: 100%; margin-bottom: 40px; display: flex; justify-content: center; }
        
        #rotate {
            -webkit-appearance: none; width: 100%; max-width: 400px;
            height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; outline: none;
        }
        #rotate::-webkit-slider-thumb {
            -webkit-appearance: none; width: 40px; height: 10px;
            background: #fff; border-radius: 2px; cursor: pointer;
        }

        .bottom-ui { display: flex; justify-content: space-between; align-items: flex-end; }
        .product-info h1 { font-size: 32px; text-transform: uppercase; margin: 0; font-weight: 900; letter-spacing: -0.02em;}
        #sector-label { color: rgba(255,255,255,0.5); font-size: 11px; letter-spacing: 0.2em; margin-top: 4px; text-transform: uppercase; }
