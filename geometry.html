<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COTA LAB // CLT ARCHIVE</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { --bg: #000; --glass: rgba(255, 255, 255, 0.03); }
        body, html { 
            margin: 0; padding: 0; background: var(--bg); 
            font-family: "Inter", sans-serif; color: white; 
            overflow-x: hidden; -webkit-font-smoothing: antialiased;
        }

        header {
            position: fixed; top: 0; width: 100%; display: flex; 
            justify-content: center; padding: 30px 0; z-index: 100; pointer-events: none;
        }
        .logo { font-weight: 900; font-size: 1.2rem; letter-spacing: 0.8em; text-transform: uppercase; margin-right: -0.8em; }

        #parallax-bg {
            position: fixed; inset: 0; z-index: 1;
            background-size: cover; background-position: center;
            background-repeat: no-repeat;
            will-change: background-image;
        }
        #parallax-bg::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent 20%, transparent 80%, rgba(0,0,0,0.9));
        }

        .main-stage { 
            position: relative; z-index: 10; 
            display: flex; flex-direction: column; align-items: center; 
            height: 250vh; /* Total scrollable area */
        }

        .product-container {
            width: 100%; display: flex; flex-direction: column; align-items: center;
            margin-top: 5vh;
        }

        .viewer-wrap {
            width: 100%; height: 70vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        model-viewer { width: 100vw; height: 100%; outline: none; --progress-bar-color: transparent; }

        .slider-wrap { width: 240px; margin-top: -40px; text-align: center; z-index: 50; position: relative; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; cursor: ew-resize; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 2px; background: rgba(255,255,255,0.2); }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%;
            background: #fff; margin-top: -6px; border: none;
        }

        .liquid-glass {
            width: 88%; max-width: 420px;
            margin: 40px 0 100px 0; padding: 35px;
            border-radius: 28px; background: var(--glass);
            backdrop-filter: blur(50px) saturate(160%);
            -webkit-backdrop-filter: blur(50px) saturate(160%);
            border: 1px solid rgba(255,255,255,0.1);
            box-sizing: border-box;
        }

        .glass-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 15px; }
        .glass-header h1 { font-size: 26px; font-weight: 900; margin: 0; letter-spacing: -0.02em; }
        .price { font-family: monospace; opacity: 0.5; font-size: 14px; }
        .desc { font-size: 13px; line-height: 1.6; opacity: 0.4; margin-bottom: 35px; }

        .size-row { display: flex; gap: 8px; margin-bottom: 25px; }
        .size-btn {
            flex: 1; border: 1px solid rgba(255,255,255,0.1); 
            background: transparent; color: white; padding: 12px 0;
            border-radius: 10px; font-size: 11px; font-weight: 800; cursor: pointer;
        }
        .size-btn.active { background: white; color: black; border-color: white; }

        .buy-btn {
            width: 100%; padding: 20px;
            background: white; color: black; border: none; border-radius: 14px;
            font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 14px;
        }

        .archive-tag { font-size: 8px; letter-spacing: 5px; opacity: 0.3; text-align: center; margin-top: 30px; }
    </style>
</head>
<body>

    <header><div class="logo">Cota Lab</div></header>
    <div id="parallax-bg"></div>

    <main class="main-stage">
        <div class="product-container">
            <div class="viewer-wrap">
                <model-viewer id="shirt" src="Tshirt.glb" camera-orbit="0deg 75deg 105%" auto-rotate rotation-per-second="15deg" interaction-prompt="none" touch-action="none"></model-viewer>
                <div class="slider-wrap">
                    <input type="range" id="rot" min="-180" max="180" value="0">
                </div>
            </div>

            <div class="liquid-glass">
                <div class="glass-header">
                    <h1>CLT // ARCHIVE</h1>
                    <span class="price">$54.00</span>
                </div>
                <p class="desc">Heavyweight cotton. Digital-to-physical garment archive. Pixel-mapped cloud architecture captured from the CLT grid.</p>
                <div class="size-row">
                    <button class="size-btn">S</button>
                    <button class="size-btn active">M</button>
                    <button class="size-btn">L</button>
                    <button class="size-btn">XL</button>
                </div>
                <button class="buy-btn">Acquire Piece</button>
                <div class="archive-tag">ARCHIVE V3.4 // STABLE</div>
            </div>
        </div>
    </main>

    <script>
        const bg = document.getElementById('parallax-bg');
        const shirt = document.getElementById('shirt');
        const slider = document.getElementById('rot');
        
        const frames = [
            'street-view.jpg', 'street-view 1.jpg', 'street-view 2.jpg', 
            'street-view 3.jpg', 'street-view 4.jpg', 'street-view 5.jpg'
        ];

        // 1. FAST-SCRUB ENGINE (600px range)
        const scrollDistance = 600; 
        window.addEventListener('scroll', () => {
            const progress = Math.min(window.scrollY / scrollDistance, 1);
            const frameIdx = Math.floor(progress * (frames.length - 1));
            const newBg = `url('${frames[frameIdx]}')`;
            if (bg.style.backgroundImage !== newBg) {
                bg.style.backgroundImage = newBg;
            }
        });
        bg.style.backgroundImage = `url('${frames[0]}')`;

        // 2. TEXTURE INJECTION (No Flashbangs)
        shirt.addEventListener('load', () => {
            const material = shirt.model.materials[0];
            const createAndApply = async () => {
                const tex = await shirt.createTexture('cota_cloud_pixelart.png');
                if (material.pbrMetallicRoughness.baseColorTexture) {
                    material.pbrMetallicRoughness.baseColorTexture.setTexture(tex);
                }
            };
            createAndApply();
        });

        // 3. SLIDER FIX
        slider.addEventListener('input', (e) => {
            shirt.removeAttribute('auto-rotate'); // Kill auto-rotate immediately
            // Directly set camera-orbit property
            shirt.cameraOrbit = `${e.target.value}deg 75deg 105%`;
        });

        // 4. UI LOGIC
        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelector('.size-btn.active').classList.remove('active');
                btn.classList.add('active');
            };
        });
    </script>
</body>
</html>
