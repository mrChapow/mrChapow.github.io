<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cota Lab // CLT Archive</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { --bg: #000; --glass: rgba(255, 255, 255, 0.05); }
        body, html { margin: 0; padding: 0; background: var(--bg); font-family: "Inter", sans-serif; color: white; }

        /* THE CLT STREET VIEW ENGINE */
        #parallax-bg {
            position: fixed; inset: 0; z-index: 1;
            background-size: cover; background-position: center;
            background-repeat: no-repeat;
            will-change: background-image;
            filter: brightness(0.7) contrast(1.2); /* Makes the street view grittier */
        }

        .scroll-wrapper { position: relative; z-index: 10; }

        /* Tighter sectioning based on your sketch */
        .product-section {
            position: relative;
            height: 180vh; 
            display: flex; flex-direction: column; align-items: center;
        }

        /* STAGE 1: THE SHIRT + SLIDER */
        .model-stage {
            height: 100vh; width: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding-top: 20px;
        }

        model-viewer { 
            width: 95vw; height: 65vh; outline: none; 
            --poster-color: transparent;
        }

        .slider-ui {
            width: 280px; text-align: center;
            margin-top: -20px; /* Pulls slider closer to the shirt */
        }

        input[type=range] {
            -webkit-appearance: none; width: 100%; background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 1px; background: rgba(255,255,255,0.4);
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%;
            background: #fff; margin-top: -6px; border: 2px solid black;
        }

        /* STAGE 2: LIQUID GLASS (REVEALS ON SCROLL) */
        .glass-card {
            width: 88%; max-width: 440px;
            margin-top: 5vh; 
            padding: 35px; border-radius: 28px;
            background: var(--glass);
            backdrop-filter: blur(50px) saturate(180%);
            -webkit-backdrop-filter: blur(50px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .glass-card h1 { font-size: 32px; font-weight: 900; margin: 0; text-transform: uppercase; }
        .glass-card p { opacity: 0.6; font-size: 14px; line-height: 1.6; margin: 15px 0 25px 0; }

        .buy-area { display: flex; gap: 10px; }
        .size-box { flex: 1; height: 45px; border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-weight: 800; border-radius: 8px; }
        .buy-btn { flex: 2; background: white; color: black; border: none; border-radius: 8px; font-weight: 900; text-transform: uppercase; cursor: pointer; }

    </style>
</head>
<body>

    <div id="parallax-bg"></div>

    <div class="scroll-wrapper">
        
        <section class="product-section">
            <div class="model-stage">
                <model-viewer id="clt-viewer" src="Tshirt.glb" camera-orbit="0deg 75deg 105%" auto-rotate rotation-per-second="15deg" interaction-prompt="none"></model-viewer>
                <div class="slider-ui">
                    <input type="range" class="sync-slider" data-target="clt-viewer" min="-180" max="180" value="0">
                    <p style="font-size: 9px; letter-spacing: 3px; opacity: 0.5; margin-top: 10px;">CLT // ARCHIVE 01</p>
                </div>
            </div>

            <div class="glass-card">
                <h1>CLT Archive</h1>
                <p>Limited Lab Drop. Heavyweight architecture with pixelated cloud mapping derived from CLT street views.</p>
                <div class="buy-area">
                    <div class="size-box">M</div>
                    <div class="size-box">L</div>
                    <button class="buy-btn">BUY</button>
                </div>
            </div>
        </section>

        <section class="product-section">
            <div class="model-stage">
                <model-viewer id="furry-viewer" src="Tshirt.glb" camera-orbit="0deg 75deg 105%" auto-rotate interaction-prompt="none"></model-viewer>
                <div class="slider-ui">
                    <input type="range" class="sync-slider" data-target="furry-viewer" min="-180" max="180" value="0">
                </div>
            </div>
            <div class="glass-card">
                <h1>Furry Core</h1>
                <p>Tactile digital experiment. Mapping prototype utilizing the 'Lovefont' dataset.</p>
                <button class="buy-btn" style="width: 100%; height: 45px;">SECURE ITEM</button>
            </div>
        </section>

    </div>

    <script>
        const bg = document.getElementById('parallax-bg');
        
        // The CLT street view frames
        const burstFrames = Array.from({length: 12}, (_, i) => `burstscene${i}.png`);

        // Force the textures immediately
        const applyTex = async (id, file) => {
            const el = document.getElementById(id);
            el.addEventListener('load', async () => {
                const mat = el.model.materials[0];
                const tex = await el.createTexture(file);
                mat.pbrMetallicRoughness.baseColorTexture.setTexture(tex);
            });
        };
        applyTex('clt-viewer', 'cota_cloud_pixelart.png');
        applyTex('furry-viewer', 'lovefont.png');

        // Slider logic
        document.querySelectorAll('.sync-slider').forEach(s => {
            s.addEventListener('input', (e) => {
                const target = document.getElementById(e.target.dataset.target);
                target.removeAttribute('auto-rotate');
                target.cameraOrbit = `${e.target.value}deg 75deg 105%`;
            });
        });

        // Background Scrubbing - Locked to CLT frames for the first section
        window.addEventListener('scroll', () => {
            const vh = window.innerHeight;
            const scrollY = window.scrollY;
            
            // Only play the street view burst during the first 1.5 pages of scroll
            if (scrollY < vh * 1.5) {
                const progress = scrollY / (vh * 1.5);
                const frameIdx = Math.min(Math.floor(progress * burstFrames.length), burstFrames.length - 1);
                bg.style.backgroundImage = `url('${burstFrames[frameIdx]}')`;
            }
        });

        // Init background
        bg.style.backgroundImage = `url('${burstFrames[0]}')`;
    </script>
</body>
</html>
