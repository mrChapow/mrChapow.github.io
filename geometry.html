<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cota Lab // Natural Flow</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        :root { 
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg);
            font-family: "Inter", sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* 1. THE CINEMATIC BACKGROUND (FIXED) */
        #parallax-bg {
            position: fixed; inset: 0; z-index: 1;
            background-size: cover; background-position: center;
            will-change: background-image;
        }

        /* 2. THE SCROLLING TRACK */
        .scroll-track {
            position: relative; z-index: 10;
        }

        .product-section {
            /* Gives enough room for the scroll animation to play out before the next section hits */
            min-height: 150vh; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20vh;
        }

        /* 3. THE LIQUID GLASS TILE */
        .liquid-glass-tile {
            width: 90%; max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            text-align: left;
            position: relative;
            z-index: 12;
            margin-bottom: -10vh; /* Pulls the 3D model up so it overlaps the bottom of the glass */
        }

        h1 { font-size: 38px; font-weight: 900; text-transform: uppercase; margin: 0 0 10px 0; letter-spacing: -0.02em; }
        .sector-label { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.6; display: block; margin-bottom: 30px; }

        .cta-btn {
            width: 100%; padding: 18px;
            background: white; color: black;
            border: none; border-radius: 100px;
            font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em;
            cursor: pointer;
        }

        /* 4. THE 3D MODEL */
        .model-wrap {
            width: 100%; height: 70vh;
            display: flex; justify-content: center;
            z-index: 11;
        }

        model-viewer { 
            width: 85vw; max-width: 800px; height: 100%; 
            outline: none;
            /* Added smooth rotation transition for the Power Spin */
            transition: transform 0.4s ease; 
        }
    </style>
</head>
<body>

    <div id="parallax-bg"></div>

    <main class="scroll-track">
        
        <section class="product-section" id="section-clt">
            <div class="liquid-glass-tile">
                <span class="sector-label">Sector: CLT // Pixel Sky</span>
                <h1>Archive 001</h1>
                <p style="opacity: 0.8; line-height: 1.5;">Heavyweight cotton construction. Mapped with digital cloud architecture.</p>
                <button class="cta-btn">Pre-Order</button>
            </div>
            <div class="model-wrap">
                <model-viewer id="viewer-clt" src="Tshirt.glb" camera-orbit="0deg 75deg 105%" shadow-intensity="1" exposure="1.1"></model-viewer>
            </div>
        </section>

        <section class="product-section" id="section-furry">
            <div class="liquid-glass-tile">
                <span class="sector-label">Sector: LAB // Type Core</span>
                <h1>Archive 002</h1>
                <p style="opacity: 0.8; line-height: 1.5;">High-tactility texture integration. The next evolution of digital garment mapping.</p>
                <button class="cta-btn">Pre-Order</button>
            </div>
            <div class="model-wrap">
                <model-viewer id="viewer-furry" src="Tshirt.glb" camera-orbit="0deg 75deg 105%" shadow-intensity="1" exposure="1.1"></model-viewer>
            </div>
        </section>

    </main>

    <script>
        const bg = document.getElementById('parallax-bg');
        const viewerCLT = document.getElementById('viewer-clt');
        const viewerFurry = document.getElementById('viewer-furry');

        // Burst Animation Frames
        const burstFrames = Array.from({length: 12}, (_, i) => `burstscene${i}.png`);
        
        // Preload background frames
        burstFrames.forEach(src => { const img = new Image(); img.src = src; });

        // Apply Custom Textures silently on load (No Flashbangs)
        viewerCLT.addEventListener('load', async () => {
            const material = viewerCLT.model.materials[0];
            const texture = await viewerCLT.createTexture('cota_cloud_pixelart.png');
            material.pbrMetallicRoughness.baseColorTexture.setTexture(texture);
        });

        viewerFurry.addEventListener('load', async () => {
            const material = viewerFurry.model.materials[0];
            const texture = await viewerFurry.createTexture('lovefont.png');
            material.pbrMetallicRoughness.baseColorTexture.setTexture(texture);
        });

        // Initialize Background
        bg.style.backgroundImage = `url('${burstFrames[0]}')`;

        let furrySpun = false;

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            
            // 1. Scrub Background Frames during the first half of the scroll
            // 800 is roughly a ".5 page scroll" on most monitors. Adjust this to make it play faster/slower.
            const animationPacing = Math.min(scrollY / 800, 1); 
            const frameIndex = Math.min(Math.floor(animationPacing * burstFrames.length), burstFrames.length - 1);
            bg.style.backgroundImage = `url('${burstFrames[frameIndex]}')`;

            // 2. Trigger Power Spin when FURRY is pulled up into view
            const furryRect = viewerFurry.getBoundingClientRect();
            // If the top of the Furry model crosses the bottom 80% of the screen
            if (furryRect.top < window.innerHeight * 0.8 && !furrySpun) {
                furrySpun = true;
                viewerFurry.cameraOrbit = `720deg 75deg 105%`; // Force the pure spin
            }
        }, { passive: true });
    </script>
</body>
</html>
