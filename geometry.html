<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COTA LAB // CLT ARCHIVE</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { 
            --bg: #000; 
            --glass: rgba(255, 255, 255, 0.03); 
            --accent: #fff;
        }

        body, html { 
            margin: 0; padding: 0; 
            background: var(--bg); 
            font-family: "Inter", sans-serif; 
            color: white; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 1. HEADER LOGO */
        header {
            position: fixed; top: 0; left: 0; width: 100%;
            display: flex; justify-content: center;
            padding: 30px 0; z-index: 100; pointer-events: none;
        }
        .logo {
            font-weight: 900; font-size: 1.2rem;
            letter-spacing: 0.8em; text-transform: uppercase;
            margin-right: -0.8em; /* Offsets last letter spacing */
        }

        /* 2. BACKGROUND ENGINE */
        #parallax-bg {
            position: fixed; inset: 0; z-index: 1;
            background-size: cover; background-position: center;
            transition: background-image 0.1s ease-out;
            will-change: background-image;
        }
        #parallax-bg::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent 20%, transparent 80%, rgba(0,0,0,0.8));
        }

        /* 3. LAYOUT PHYSICS */
        .main-stage { 
            position: relative; z-index: 10; 
            display: flex; flex-direction: column; align-items: center; 
            /* Height dictates scroll speed for the 6 frames */
            height: 300vh; 
        }

        .product-container {
            width: 100%; display: flex; flex-direction: column; align-items: center;
            margin-top: 10vh; /* Initial entry height */
        }

        /* 3D MODEL & SLIDER */
        .viewer-wrap {
            width: 100%; height: 65vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        model-viewer { 
            width: 95vw; height: 100%; 
            outline: none; --progress-bar-color: transparent;
        }

        .slider-wrap { 
            width: 220px; margin-top: -30px; 
            text-align: center; z-index: 20;
        }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 1px; background: rgba(255,255,255,0.2); }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%;
            background: #fff; margin-top: -5.5px; cursor: pointer;
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        /* LIQUID GLASS TILE */
        .liquid-glass {
            width: 85%; max-width: 400px;
            margin-top: 20px; padding: 35px;
            border-radius: 24px;
            background: var(--glass);
            backdrop-filter: blur(50px) saturate(160%);
            -webkit-backdrop-filter: blur(50px) saturate(160%);
            border: 1px solid rgba(255,255,255,0.08);
            box-sizing: border-box;
        }

        .glass-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 15px; }
        .glass-header h1 { font-size: 24px; font-weight: 900; margin: 0; letter-spacing: -0.02em; }
        .price { font-family: monospace; opacity: 0.6; font-size: 14px; }

        .desc { font-size: 13px; line-height: 1.6; opacity: 0.5; margin-bottom: 30px; }

        /* SIZE PICKER LOGIC */
        .size-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .size-btn {
            flex: 1; border: 1px solid rgba(255,255,255,0.1); 
            background: transparent; color: white; padding: 10px 0;
            border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer;
            transition: 0.2s;
        }
        .size-btn.active { background: white; color: black; border-color: white; }

        .buy-btn {
            width: 100%; padding: 18px;
            background: white; color: black; border: none; border-radius: 12px;
            font-weight: 900; text-transform: uppercase; cursor: pointer;
            font-size: 14px; transition: transform 0.1s;
        }
        .buy-btn:active { transform: scale(0.98); }

        .archive-tag {
            font-size: 9px; letter-spacing: 4px; opacity: 0.3;
            text-align: center; margin-top: 25px; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header><div class="logo">Cota Lab</div></header>

    <div id="parallax-bg"></div>

    <main class="main-stage">
        <div class="product-container">
            <div class="viewer-wrap">
                <model-viewer id="shirt" 
                    src="Tshirt.glb" 
                    camera-orbit="0deg 75deg 105%" 
                    auto-rotate 
                    rotation-per-second="15deg"
                    interaction-prompt="none">
                </model-viewer>
                
                <div class="slider-wrap">
                    <input type="range" id="rot" min="-180" max="180" value="0">
                </div>
            </div>

            <div class="liquid-glass">
                <div class="glass-header">
                    <h1>CLT // ARCHIVE</h1>
                    <span class="price">$54.00</span>
                </div>
                <p class="desc">Heavyweight digital-to-physical garment. Featuring pixel-mapped cloud architecture from the CLT metropolitan grid.</p>
                
                <div class="size-row">
                    <button class="size-btn">S</button>
                    <button class="size-btn active">M</button>
                    <button class="size-btn">L</button>
                    <button class="size-btn">XL</button>
                </div>

                <button class="buy-btn">Acquire Archive</button>
                
                <div class="archive-tag">V3.4 // Stable Build</div>
            </div>
        </div>
    </main>

    <script>
        const bg = document.getElementById('parallax-bg');
        const shirt = document.getElementById('shirt');
        const slider = document.getElementById('rot');
        
        const frames = [
            'street-view.jpg', 
            'street-view 1.jpg', 
            'street-view 2.jpg', 
            'street-view 3.jpg', 
            'street-view 4.jpg', 
            'street-view 5.jpg'
        ];

        // 1. PRELOADER ENGINE (Prevents "Flashbangs")
        const preloadFrames = () => {
            frames.forEach(src => {
                const img = new Image();
                img.src = src;
            });
        };
        preloadFrames();

        // 2. TEXTURE INJECTION
        shirt.addEventListener('load', async () => {
            const mat = shirt.model.materials[0];
            const tex = await shirt.createTexture('cota_cloud_pixelart.png');
            // Check if baseColorTexture exists before setting
            if (mat.pbrMetallicRoughness.baseColorTexture) {
                mat.pbrMetallicRoughness.baseColorTexture.setTexture(tex);
            }
        });

        // 3. 360° SLIDER LOGIC
        slider.oninput = (e) => {
            shirt.removeAttribute('auto-rotate');
            shirt.cameraOrbit = `${e.target.value}deg 75deg 105%`;
        };

        // 4. SCROLL-SCRUB ENGINE
        window.addEventListener('scroll', () => {
            const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
            const scrollPercent = Math.max(0, Math.min(1, window.scrollY / scrollHeight));
            
            // Map scroll to 6 frames
            const frameIdx = Math.min(Math.floor(scrollPercent * frames.length), frames.length - 1);
            bg.style.backgroundImage = `url('${frames[frameIdx]}')`;
        });

        // Initialize first frame
        bg.style.backgroundImage = `url('${frames[0]}')`;

        // 5. UI INTERACTION
        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelector('.size-btn.active').classList.remove('active');
                btn.classList.add('active');
            };
        });
    </script>
</body>
</html>
