<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COTA LAB // ARCHIVE 001</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { 
            --bg: #000; 
            --glass: rgba(12, 12, 12, 0.5); 
            --border: rgba(255, 255, 255, 0.08);
            --text-primary: #fff;
            --text-dim: rgba(255, 255, 255, 0.4);
        }
        
        body, html { margin: 0; padding: 0; background: var(--bg); font-family: "Inter", sans-serif; color: var(--text-primary); overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        * { box-sizing: border-box; }

        /* --- GLOBAL NAVIGATION --- */
        .site-nav {
            position: fixed; top: 0; width: 100%; height: 75px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; z-index: 1000;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
        }
        .logo { font-weight: 900; font-size: 1.1rem; letter-spacing: 0.7em; text-transform: uppercase; margin-right: -0.7em; }
        .nav-link { font-size: 10px; font-weight: 800; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); cursor: pointer; }

        /* --- THE STAGE (180vh for longer mobile experience) --- */
        .archive-stage { 
            position: relative; 
            height: 180vh; 
            width: 100%; 
        }
        
        .interface-lock {
            position: sticky; top: 0;
            height: 100vh; width: 100%;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        #parallax-bg {
            position: absolute; inset: 0; z-index: 1;
            background-size: cover; background-position: center;
            background-repeat: no-repeat;
            background-image: url('street-view.jpg'); 
        }
        #parallax-bg::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to right, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.9) 100%);
        }

        /* --- PRODUCT GRID --- */
        .product-grid {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; 
            padding: 100px 20px 20px; /* Stronger top padding for mobile logo clearance */
        }

        /* 3D Model Section */
        .model-col { 
            width: 100%; height: 38vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            margin-bottom: 20px;
        }
        model-viewer { width: 100%; height: 100%; outline: none; }

        /* The Restored Slider */
        .slider-wrap { width: 200px; text-align: center; z-index: 50; margin-top: 10px; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; cursor: ew-resize; height: 30px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 1px; background: rgba(255,255,255,0.2); }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 10px; width: 10px; border-radius: 50%; background: #fff; margin-top: -4.5px; border: none; box-shadow: 0 0 10px rgba(255,255,255,0.3); }

        /* The Info Terminal */
        .info-col {
            width: 100%; max-width: 440px; padding: 30px;
            border-radius: 20px; background: var(--glass);
            backdrop-filter: blur(45px) saturate(160%); -webkit-backdrop-filter: blur(45px) saturate(160%);
            border: 1px solid var(--border);
        }

        /* PC ELEVATION */
        @media (min-width: 1024px) {
            .product-grid { flex-direction: row; justify-content: space-between; padding: 120px 8vw 40px; }
            .model-col { width: 60%; height: 80vh; margin-bottom: 0; }
            .slider-wrap { width: 260px; margin-top: -50px; }
            .info-col { width: 35%; max-width: 480px; padding: 50px; }
        }

        /* TYPOGRAPHY */
        .header-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        h1 { font-size: 24px; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: -0.02em; }
        .price { font-family: monospace; font-size: 16px; color: var(--text-dim); }
        .desc { font-size: 13px; color: var(--text-dim); line-height: 1.7; margin-bottom: 30px; }
        
        .size-row { display: flex; gap: 10px; margin-bottom: 30px; }
        .size-btn { flex: 1; border: 1px solid var(--border); background: transparent; color: white; padding: 14px 0; border-radius: 10px; font-size: 11px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .size-btn.active { background: white; color: black; border-color: white; }

        .buy-btn { width: 100%; padding: 20px; background: white; color: black; border: none; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; letter-spacing: 0.05em; }
        
        .meta-tag { font-family: monospace; font-size: 9px; color: var(--text-dim); text-align: center; margin-top: 25px; text-transform: uppercase; letter-spacing: 0.2em; }

        /* --- THE HAIRLINE DIVIDER --- */
        .next-segment { 
            height: 100vh; 
            background: #000; 
            border-top: 1px solid rgba(255,255,255,0.05); /* Minimalist divider */
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <nav class="site-nav">
        <div class="nav-link">Catalog</div>
        <div class="logo">Cota Lab</div>
        <div class="nav-link">Cart [0]</div>
    </nav>

    <section class="archive-stage" id="main-track">
        <div class="interface-lock">
            <div id="parallax-bg"></div>
            
            <div class="product-grid">
                
                <div class="model-col">
                    <model-viewer id="shirt" src="Tshirt.glb" camera-orbit="0deg 75deg 105%" auto-rotate interaction-prompt="none" touch-action="none"></model-viewer>
                    <div class="slider-wrap">
                        <input type="range" id="rot" min="-180" max="180" value="0">
                    </div>
                </div>

                <aside class="info-col">
                    <div class="header-row">
                        <h1>CLT // 001</h1>
                        <span class="price">$54.00</span>
                    </div>
                    
                    <p class="desc">Engineered for the domestic grid. Heavyweight 320GSM cotton, pixel-mapped texture profile. This is the quality gap closed. Take it or leave it.</p>
                    
                    <div class="size-row">
                        <button class="size-btn">S</button>
                        <button class="size-btn active">M</button>
                        <button class="size-btn">L</button>
                        <button class="size-btn">XL</button>
                    </div>

                    <button class="buy-btn">Acquire Archive</button>
                    <div class="meta-tag">SYS_V4.6 // ARCHIVE_AUTHENTICATED</div>
                </aside>

            </div>
        </div>
    </section>

    <section class="next-segment">
        <h2 style="letter-spacing: 1em; opacity: 0.1; font-size: 11px; text-transform: uppercase;">Next Phase Loading</h2>
    </section>

    <script>
        const bg = document.getElementById('parallax-bg');
        const shirt = document.getElementById('shirt');
        const slider = document.getElementById('rot');
        const track = document.getElementById('main-track');
        
        const frames = ['street-view.jpg', 'street-view 1.jpg', 'street-view 2.jpg', 'street-view 3.jpg', 'street-view 4.jpg', 'street-view 5.jpg'];

        // PRELOAD
        frames.forEach(src => { const img = new Image(); img.src = src; });

        // CLEAN SCROLL ENGINE
        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const maxScroll = track.offsetHeight - window.innerHeight;
            
            // Normalize progress through the long track
            const progress = Math.min(Math.max(scrollY / maxScroll, 0), 1);
            const frameIdx = Math.floor(progress * (frames.length - 1));
            
            const targetBg = `url('${frames[frameIdx]}')`;
            if (bg.style.backgroundImage !== targetBg) {
                bg.style.backgroundImage = targetBg;
            }
        });

        // TEXTURE INJECTION
        shirt.addEventListener('load', () => {
            const material = shirt.model.materials[0];
            const applyTex = async () => {
                const tex = await shirt.createTexture('cota_cloud_pixelart.png');
                if (material.pbrMetallicRoughness.baseColorTexture) {
                    material.pbrMetallicRoughness.baseColorTexture.setTexture(tex);
                }
            };
            applyTex();
        });

        // SLIDER CONTROL (Restored Logic)
        slider.addEventListener('input', (e) => {
            shirt.removeAttribute('auto-rotate');
            shirt.cameraOrbit = `${e.target.value}deg 75deg 105%`;
        });

        // SIZE SELECTION
        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelector('.size-btn.active').classList.remove('active');
                btn.classList.add('active');
            };
        });
    </script>
</body>
</html>
