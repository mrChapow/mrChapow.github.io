<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cota Lab // Archive 001</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        :root { 
            --accent: #000000;
            --bg: #ffffff;
            --secondary: #666666;
            --glass: rgba(255, 255, 255, 0.4);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: var(--accent);
            font-family: "Inter", -apple-system, sans-serif;
            overflow-x: hidden; /* Allow vertical scroll for parallax */
            letter-spacing: -0.02em;
        }

        /* 1. THE BACKGROUND (Street View Container) */
        #parallax-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
            overflow: hidden;
            background: #e2e8f0; /* Fallback */
        }

        .street-view-img {
            position: absolute;
            width: 110%; height: 110%; /* Extra room for zoom */
            top: -5%; left: -5%;
            object-fit: cover;
            transition: transform 0.1s ease-out;
            /* Placeholder gradient until you drop the first image */
            background: radial-gradient(circle at center, #cbd5e1 0%, #ffffff 100%);
        }

        .grain-overlay {
            position: fixed;
            inset: 0; opacity: 0.07;
            pointer-events: none; z-index: 2;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* 2. THE SHIRT (Scaled down and centered) */
        model-viewer {
            position: fixed;
            inset: 0;
            width: 100%; height: 100%;
            z-index: 3;
            outline: none;
            --poster-color: transparent;
        }

        /* 3. LIQUID GLASS UI */
        .interface {
            position: fixed;
            inset: 0;
            padding: 40px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            z-index: 100;
        }

        .bottom-ui {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: auto;
        }

        /* Apple-style Liquid Glass Button */
        .cta-button {
            background: var(--glass);
            backdrop-filter: blur(15px) saturate(180%);
            -webkit-backdrop-filter: blur(15px) saturate(180%);
            color: black;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 14px 40px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .cta-button:hover {
            background: rgba(255, 255, 255, 0.6);
            transform: translateY(-2px);
        }

        .header-container {
            position: fixed; top: 40px; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            z-index: 9999; pointer-events: none;
        }

        /* SCROLL SPACER (Creates the scroll depth) */
        #scroll-engine {
            height: 300vh; /* Three "stages" of zoom/movement */
            width: 10px;
        }

        @media (max-width: 768px) {
            .interface { padding: 25px; }
            .bottom-ui { flex-direction: column; align-items: flex-start; }
            .cta-button { width: 100%; margin-top: 20px; }
        }
    </style>
</head>
<body>

    <div id="parallax-bg">
        <div id="street-img" class="street-view-img"></div>
    </div>

    <div class="grain-overlay"></div>

    <header class="header-container">
        <div class="brand-id" style="font-weight:800; pointer-events:auto;">COTA // LAB</div>
    </header>

    <model-viewer 
        id="main-viewer"
        src="Tshirt.glb" 
        scale="0.65 0.65 0.65"
        auto-rotate 
        camera-controls
        disable-zoom
        disable-pan
        shadow-intensity="1" 
        exposure="1.2"
        camera-orbit="0deg 75deg 105%"
        touch-action="pan-y">
    </model-viewer>

    <div class="interface">
        <div class="bottom-ui">
            <div class="product-info">
                <h1 id="title" class="product-title">Archive 001</h1>
                <p id="desc" class="product-description">Tokyo Sector // Moving forward into the grid.</p>
            </div>
            <div class="purchase-zone">
                <button class="cta-button">Pre-Order</button>
            </div>
        </div>
    </div>

    <div id="scroll-engine"></div>

    <script>
        const modelViewer = document.querySelector('#main-viewer');
        const streetImg = document.querySelector('#street-img');

        // 1. THE FLOATING BOB ANIMATION
        let lastTime = 0;
        function animate(time) {
            const delta = time * 0.002; // Speed
            const bob = Math.sin(delta) * 0.05; // Amplitude (height)
            
            // Apply a slight Y-offset to the model
            // model-viewer doesn't let us move the mesh directly easily, 
            // so we'll adjust the camera-target slightly for a similar feel
            modelViewer.cameraTarget = `0m ${0.1 + bob}m 0m`;
            
            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);

        // 2. THE PARALLAX ZOOM LOGIC
        window.addEventListener('scroll', () => {
            const scrollPercent = window.scrollY / (document.body.scrollHeight - window.innerHeight);
            
            // Zoom the background (Parallax)
            // Starts at 1.0, ends at 1.4
            const zoom = 1 + (scrollPercent * 0.4);
            streetImg.style.transform = `scale(${zoom})`;

            // Logic for texture/environment swap goes here next
            if (scrollPercent > 0.5) {
                // Future: Swap to Archive 002
            }
        });
    </script>
</body>
</html>
