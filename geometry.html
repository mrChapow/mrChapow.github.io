<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COTA LAB // ARCHIVE 001</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { 
            --bg: #000; 
            --glass: rgba(10, 10, 10, 0.7); 
            --border: rgba(255, 255, 255, 0.1);
        }
        
        body, html { margin: 0; padding: 0; background: var(--bg); font-family: "Inter", sans-serif; color: white; overflow-x: hidden; }

        /* --- 1. THE FILM STRIP BACKGROUND --- */
        .bg-view-window {
            position: absolute; inset: 0; z-index: 1;
            overflow: hidden; /* Only show one "frame" at a time */
            pointer-events: none;
        }

        #bg-strip {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 600%; /* 6 images = 600% height */
            display: flex; flex-direction: column;
            will-change: transform;
            transition: transform 0.1s cubic-bezier(0.2, 0.8, 0.2, 1); /* Adds that "clever" smooth glide */
        }

        .bg-frame {
            width: 100%; height: 16.666%; /* 100/6 */
            background-size: cover; background-position: center;
        }

        /* Overlay to bind the UI to the background */
        .bg-view-window::after {
            content: ''; position: absolute; inset: 0; z-index: 5;
            background: linear-gradient(to right, rgba(0,0,0,0.6), rgba(0,0,0,0.9));
        }

        /* --- 2. THE STICKY UI --- */
        .archive-stage { position: relative; height: 200vh; width: 100%; }
        
        .interface-lock { 
            position: sticky; top: 0; 
            height: 100vh; width: 100%; 
            display: flex; flex-direction: column; 
        }

        .product-grid {
            position: relative; z-index: 100;
            display: flex; flex-direction: column; align-items: center;
            height: 100%; padding: 80px 20px;
        }

        .model-col { width: 100%; height: 40vh; }
        model-viewer { width: 100%; height: 100%; outline: none; }

        .info-col {
            width: 100%; max-width: 420px; padding: 30px;
            border-radius: 24px; background: var(--glass);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border);
        }

        /* DESKTOP SPLIT */
        @media (min-width: 1024px) {
            .product-grid { flex-direction: row; justify-content: space-around; padding-top: 120px; }
            .model-col { width: 50%; height: 75vh; }
            .info-col { width: 35%; padding: 50px; }
        }

        h1 { font-size: 24px; font-weight: 900; text-transform: uppercase; margin: 0 0 10px; letter-spacing: -0.03em; }
        .desc { font-size: 13px; opacity: 0.5; line-height: 1.6; margin-bottom: 25px; }
        .buy-btn { width: 100%; padding: 20px; background: #fff; color: #000; border: none; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body>

    <section class="archive-stage" id="scroll-track">
        <div class="interface-lock">
            
            <div class="bg-view-window">
                <div id="bg-strip">
                    <div class="bg-frame" style="background-image: url('street-view.jpg');"></div>
                    <div class="bg-frame" style="background-image: url('street-view 1.jpg');"></div>
                    <div class="bg-frame" style="background-image: url('street-view 2.jpg');"></div>
                    <div class="bg-frame" style="background-image: url('street-view 3.jpg');"></div>
                    <div class="bg-frame" style="background-image: url('street-view 4.jpg');"></div>
                    <div class="bg-frame" style="background-image: url('street-view 5.jpg');"></div>
                </div>
            </div>

            <div class="product-grid">
                <div class="model-col">
                    <model-viewer id="shirt" src="Tshirt.glb" camera-orbit="0deg 75deg 105%" auto-rotate interaction-prompt="none" touch-action="none"></model-viewer>
                </div>
                <aside class="info-col">
                    <h1>CLT // ARCHIVE 001</h1>
                    <p class="desc">Heavyweight physical garment. Pixel-mapped cloud architecture. Optimized for the grid.</p>
                    <button class="buy-btn">Acquire Archive</button>
                </aside>
            </div>
        </div>
    </section>

    <div style="height: 100vh; background: #000;"></div>

    <script>
        const strip = document.getElementById('bg-strip');
        const track = document.getElementById('scroll-track');
        const shirt = document.getElementById('shirt');

        // SIMPLE MOTION ENGINE
        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const maxScroll = track.offsetHeight - window.innerHeight;
            
            // Percentage (0 to 1)
            const progress = Math.min(Math.max(scrollY / maxScroll, 0), 1);
            
            // Move the strip UP by a percentage of its total height
            // We multiply by 83.33 (which is 100% minus the last frame's height) 
            // so the last frame stops perfectly in view.
            const moveY = progress * 83.33; 
            
            strip.style.transform = `translateY(-${moveY}%)`;
        });

        // TEXTURE INJECTION
        shirt.addEventListener('load', () => {
            const material = shirt.model.materials[0];
            const applyTex = async () => {
                const tex = await shirt.createTexture('cota_cloud_pixelart.png');
                if (material.pbrMetallicRoughness.baseColorTexture) {
                    material.pbrMetallicRoughness.baseColorTexture.setTexture(tex);
                }
            };
            applyTex();
        });
    </script>
</body>
</html>
