<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cota Lab // Archive 001</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        :root { 
            --accent: #ffffff;
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.12);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            font-family: "Inter", sans-serif;
            overflow-x: hidden;
            color: white;
        }

        /* 1. THE SCROLL RUNWAY (Forces the scrollbar to work) */
        #scroll-engine {
            height: 500vh; /* Length of the "walk" */
            width: 100%;
            position: absolute;
            top: 0; left: 0;
            z-index: 0;
        }

        /* 2. THE BACKGROUND (Fixed so it doesn't move) */
        #parallax-bg {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-size: cover;
            background-position: center;
            will-change: background-image, transform;
            pointer-events: none;
        }

        /* 3. THE PROTECTED LOOT */
        .model-container {
            position: fixed;
            inset: 0;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none; 
            animation: floatingBob 4s ease-in-out infinite;
        }
        @keyframes floatingBob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        model-viewer { width: 45vw; height: 45vh; outline: none; }

        /* 4. BRANDING & UI */
        .header {
            position: fixed; top: 40px; width: 100%;
            display: flex; justify-content: center; z-index: 100;
        }
        .brand-id { font-weight: 900; font-size: 11px; letter-spacing: 0.8em; }

        .interface {
            position: fixed; inset: 0; padding: 50px;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: flex-end; z-index: 100;
        }
        .ui-wrap { pointer-events: auto; width: 100%; max-width: 1200px; margin: 0 auto; }

        /* SLIDER (4px) */
        .slider-container { width: 100%; margin-bottom: 40px; display: flex; justify-content: center; }
        #rotate {
            -webkit-appearance: none; width: 100%; max-width: 400px;
            height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; outline: none;
        }
        #rotate::-webkit-slider-thumb {
            -webkit-appearance: none; width: 50px; height: 8px;
            background: #fff; border-radius: 4px; cursor: pointer;
        }

        .bottom-ui { display: flex; justify-content: space-between; align-items: flex-end; }
        .product-info h1 { font-size: 38px; text-transform: uppercase; margin: 0; font-weight: 900; }
        .product-info p { color: rgba(255,255,255,0.5); font-size: 12px; letter-spacing: 0.2em; margin-top: 5px; }

        .cta-button {
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            color: white; border: 1px solid rgba(255,255,255,0.2);
            padding: 16px 45px; border-radius: 100px;
            font-size: 11px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.2em; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="scroll-engine"></div>
    <div id="parallax-bg"></div>

    <header class="header">
        <div class="brand-id">COTA // LAB</div>
    </header>

    <div class="model-container">
        <model-viewer id="viewer" src="Tshirt.glb" shadow-intensity="1" exposure="1.2" style="pointer-events:none;"></model-viewer>
    </div>

    <div class="interface">
        <div class="ui-wrap">
            <div class="slider-container">
                <input type="range" id="rotate" min="0" max="360" value="0">
            </div>
            <div class="bottom-ui">
                <div class="product-info">
                    <h1>Archive 001</h1>
                    <p>Sector: CLT // Approach Phase</p>
                </div>
                <div class="purchase-zone">
                    <button class="cta-button">Pre-Order</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const bg = document.getElementById('parallax-bg');
        const viewer = document.getElementById('viewer');
        const slider = document.getElementById('rotate');

        // File names with exact spaces from your screenshot
        const images = [
            'street-view.jpg',
            'street-view 1.jpg',
            'street-view 2.jpg',
            'street-view 3.jpg',
            'street-view 4.jpg',
            'street-view 5.jpg'
        ];

        // Preload for zero flickering
        images.forEach(src => {
            const img = new Image();
            img.src = src;
        });

        // 1. Rotation Interaction
        slider.oninput = (e) => {
            viewer.cameraOrbit = `${e.target.value}deg 75deg 105%`;
            viewer.autoRotate = false;
        };

        // 2. The Fixed Scroll Sync
        window.addEventListener('scroll', () => {
            const scrollPercent = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight);
            
            // Calculate Frame
            const frameIndex = Math.min(Math.floor(scrollPercent * images.length), images.length - 1);
            
            // Update Image
            bg.style.backgroundImage = `url('${images[frameIndex]}')`;

            // Micro-Dolly Zoom (Subtle 1.0 to 1.05 per frame)
            const frameProgress = (scrollPercent * images.length) % 1;
            const zoom = 1 + (frameProgress * 0.05);
            bg.style.transform = `scale(${zoom})`;
        }, { passive: true });

        // Initialize first frame
        bg.style.backgroundImage = `url('${images[0]}')`;
    </script>
</body>
</html>
