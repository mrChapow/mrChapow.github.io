<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cota Lab // CLT Mission</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow-x: hidden; }

        /* The background that stays still while images swap */
        #bg-container {
            position: fixed; inset: 0; z-index: 1;
            background-size: cover; background-position: center;
        }

        /* The 3D Loot Item - NO Interaction */
        .model-container {
            position: fixed; inset: 0; z-index: 2;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; 
            animation: bob 4s ease-in-out infinite;
        }
        @keyframes bob { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-20px); } 
        }

        /* The Scroll Runway - This MUST be long to trigger the swap */
        #scroll-engine { height: 600vh; position: relative; z-index: 0; }

        /* UI Layer */
        .ui {
            position: fixed; bottom: 40px; left: 0; width: 100%;
            z-index: 10; display: flex; flex-direction: column; align-items: center;
            pointer-events: none;
        }
        .slider-wrap { width: 80%; max-width: 500px; pointer-events: auto; }
        
        input[type=range] {
            width: 100%; height: 4px; /* The requested 4px thickness */
            appearance: none; background: rgba(255,255,255,0.3); outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            appearance: none; width: 50px; height: 10px; background: #fff; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="scroll-engine"></div>
    <div id="bg-container"></div>

    <div class="model-container">
        <model-viewer id="viewer" src="Tshirt.glb" shadow-intensity="1" exposure="1.2" style="width:50vw; height:50vh; pointer-events:none;"></model-viewer>
    </div>

    <div class="ui">
        <div class="slider-wrap">
            <input type="range" id="rotate" min="0" max="360" value="0">
        </div>
        <p style="color: white; font-family: sans-serif; letter-spacing: 2px; font-size: 10px;">SCROLL TO WALK // SLIDE TO INSPECT</p>
    </div>

    <script>
        const bg = document.getElementById('bg-container');
        const viewer = document.getElementById('viewer');
        const slider = document.getElementById('rotate');

        const images = [
            'street-view.jpg',
            'street-view1.jpg',
            'street-view2.jpg',
            'street-view3.jpg',
            'street-view4.jpg',
            'street-view5.jpg'
        ];

        // 1. Rotation Logic
        slider.oninput = (e) => {
            viewer.cameraOrbit = `${e.target.value}deg 75deg 105%`;
            viewer.autoRotate = false;
        };

        // 2. The Flipbook Logic
        window.onscroll = () => {
            const scrollPercent = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight);
            
            // Calculate frame (0-5)
            const frame = Math.floor(scrollPercent * images.length);
            const activeFrame = Math.min(frame, images.length - 1);

            // Force update background
            bg.style.backgroundImage = `url('${images[activeFrame]}')`;
        };

        // Set initial frame
        bg.style.backgroundImage = `url('${images[0]}')`;
    </script>
</body>
</html>
