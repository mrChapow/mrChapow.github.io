<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COTA LAB // ARCHIVE 001</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { 
            --bg: #000; 
            --glass: rgba(10, 10, 10, 0.45); 
            --border: rgba(255, 255, 255, 0.07);
        }
        
        body, html { margin: 0; padding: 0; background: var(--bg); font-family: "Inter", sans-serif; color: white; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

        /* --- NAVIGATION --- */
        .site-nav {
            position: fixed; top: 0; width: 100%; height: 80px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; z-index: 1000;
            background: linear-gradient(to bottom, rgba(0,0,0,1) 0%, transparent 100%);
        }
        .logo { font-weight: 900; font-size: 1.1rem; letter-spacing: 0.8em; text-transform: uppercase; margin-right: -0.8em; }
        .nav-link { font-size: 10px; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.4; }

        /* --- THE TRACK (Extended for deeper scroll) --- */
        .archive-stage { position: relative; height: 220vh; width: 100%; }
        
        .interface-lock {
            position: sticky; top: 0;
            height: 100vh; width: 100%;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        #parallax-bg {
            position: absolute; inset: 0; z-index: 1;
            background-size: cover; background-position: center;
            background-repeat: no-repeat;
            background-image: url('street-view.jpg');
            will-change: transform, background-image;
        }
        #parallax-bg::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to right, rgba(0,0,0,0.5), rgba(0,0,0,0.9));
        }

        /* --- THE DYNAMIC PRODUCT GRID --- */
        #product-grid {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; width: 100%;
            padding: 0 20px;
            /* Initial Offset for the "Half-Inch" Reveal */
            transform: translateY(25vh); 
            will-change: transform;
        }

        .model-col { 
            width: 100%; height: 40vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            margin-bottom: 25px;
            margin-top: 100px; /* Safety margin from logo */
        }
        model-viewer { width: 100%; height: 100%; outline: none; }

        .slider-wrap { width: 180px; margin-top: 15px; z-index: 50; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; height: 30px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 1px; background: rgba(255,255,255,0.2); }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 10px; width: 10px; border-radius: 50%; background: #fff; margin-top: -4.5px; border: none; }

        .info-col {
            width: 100%; max-width: 420px; padding: 30px;
            border-radius: 20px; background: var(--glass);
            backdrop-filter: blur(50px) saturate(180%); -webkit-backdrop-filter: blur(50px) saturate(180%);
            border: 1px solid var(--border);
        }

        /* PC RESTORATION */
        @media (min-width: 1024px) {
            #product-grid { flex-direction: row; justify-content: space-around; padding: 0 8vw; transform: translateY(15vh); }
            .model-col { width: 55%; height: 80vh; margin-top: 0; }
            .info-col { width: 35%; padding: 50px; }
        }

        /* UI DETAILS */
        .header-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        h1 { font-size: 22px; font-weight: 900; text-transform: uppercase; margin: 0; }
        .price { font-family: monospace; opacity: 0.5; }
        .desc { font-size: 12px; opacity: 0.4; line-height: 1.7; margin-bottom: 25px; }
        .buy-btn { width: 100%; padding: 18px; background: white; color: black; border: none; border-radius: 8px; font-weight: 900; text-transform: uppercase; }

        /* NEXT SCENE BUFFER */
        .next-segment { height: 100vh; background: #000; border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <nav class="site-nav">
        <div class="nav-link">Coll.</div>
        <div class="logo">Cota Lab</div>
        <div class="nav-link">001</div>
    </nav>

    <section class="archive-stage" id="track">
        <div class="interface-lock">
            <div id="parallax-bg"></div>
            
            <div id="product-grid">
                <div class="model-col">
                    <model-viewer id="shirt" src="Tshirt.glb" camera-orbit="0deg 75deg 105%" auto-rotate interaction-prompt="none" touch-action="none"></model-viewer>
                    <div class="slider-wrap">
                        <input type="range" id="rot" min="-180" max="180" value="0">
                    </div>
                </div>

                <aside class="info-col">
                    <div class="header-row">
                        <h1>CLT // ARCHIVE</h1>
                        <span class="price">$54.00</span>
                    </div>
                    <p class="desc">Engineered quality. Pixel-mapped architecture. Domestic craft. The gap is closed.</p>
                    <button class="buy-btn">Acquire</button>
                    <div style="font-family: monospace; font-size: 8px; text-align: center; margin-top: 20px; opacity: 0.2; letter-spacing: 0.3em;">RESTORED_AUTH_V4.7</div>
                </aside>
            </div>
        </div>
    </section>

    <div class="next-segment"></div>

    <script>
        const bg = document.getElementById('parallax-bg');
        const grid = document.getElementById('product-grid');
        const track = document.getElementById('track');
        const shirt = document.getElementById('shirt');
        const rot = document.getElementById('rot');

        const frames = ['street-view.jpg', 'street-view 1.jpg', 'street-view 2.jpg', 'street-view 3.jpg', 'street-view 4.jpg', 'street-view 5.jpg'];

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const maxScroll = track.offsetHeight - window.innerHeight;
            const progress = Math.min(Math.max(scrollY / maxScroll, 0), 1);

            // 1. BACKGROUND ENGINE (Swaps over the first 70% of the scroll)
            const frameProgress = Math.min(progress / 0.7, 1);
            const frameIdx = Math.floor(frameProgress * (frames.length - 1));
            bg.style.backgroundImage = `url('${frames[frameIdx]}')`;

            // 2. THE KINETIC REVEAL (The upward travel)
            // Mobile starts at 25vh offset. We move it to 0vh as we scroll.
            const isMobile = window.innerWidth < 1024;
            const startOffset = isMobile ? 25 : 15; 
            const currentOffset = startOffset - (progress * startOffset * 1.5); 
            grid.style.transform = `translateY(${Math.max(currentOffset, 0)}vh)`;

            // 3. OPTIONAL: BACKGROUND ZOOM
            const scale = 1 + (progress * 0.05);
            bg.style.transform = `scale(${scale})`;
        });

        // RE-ADDED SLIDER LOGIC
        rot.addEventListener('input', (e) => {
            shirt.removeAttribute('auto-rotate');
            shirt.cameraOrbit = `${e.target.value}deg 75deg 105%`;
        });

        // TEXTURE INJECTION
        shirt.addEventListener('load', () => {
            const material = shirt.model.materials[0];
            const applyTex = async () => {
                const tex = await shirt.createTexture('cota_cloud_pixelart.png');
                if (material.pbrMetallicRoughness.baseColorTexture) {
                    material.pbrMetallicRoughness.baseColorTexture.setTexture(tex);
                }
            };
            applyTex();
        });
    </script>
</body>
</html>
