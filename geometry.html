<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cota Lab // Archive</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        
        #root { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: 1; }

        /* THE MODEL - Must be accessible to touch */
        model-viewer {
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        /* THE SCROLL ENGINE - Now a transparent overlay that doesn't block rotation */
        #scroll-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 200vh; /* Height for 2 shirts */
            z-index: 3;
            pointer-events: none; /* KEY: Clicks go THROUGH to the shirt */
        }

        .scroll-trigger {
            height: 100vh;
            pointer-events: none;
        }

        /* SIMPLE UI */
        .interface {
            position: fixed;
            bottom: 40px;
            left: 40px;
            z-index: 4;
            pointer-events: none;
        }
        .brand { position: fixed; top: 40px; width: 100%; text-align: center; letter-spacing: 0.3em; z-index: 4; }
    </style>
</head>
<body>

    <div id="root">
        <div class="brand">COTA // LAB</div>

        <model-viewer 
            id="shirt-viewer"
            src="Tshirt.glb" 
            auto-rotate 
            camera-controls
            shadow-intensity="1"
            touch-action="pan-y"> </model-viewer>

        <div class="interface">
            <h1 id="shirt-title">Archive 001</h1>
            <p id="shirt-price">$1.15</p>
        </div>
    </div>

    <div id="scroll-container">
        <div class="scroll-trigger" data-id="1"></div>
        <div class="scroll-trigger" data-id="2"></div>
    </div>

    <script>
        const modelViewer = document.querySelector('#shirt-viewer');
        
        const archive = {
            "1": { title: "Archive 001", price: "$1.15", texture: "cota_cloud_pixelart.png" },
            "2": { title: "Archive 002", price: "$1.75", texture: "lovefont.png" }
        };

        let textureCache = {};

        // 1. Load the model and prep textures
        modelViewer.addEventListener('load', async () => {
            for (const key in archive) {
                textureCache[key] = await modelViewer.createTexture(archive[key].texture);
            }

            const material = modelViewer.model.materials.find(m => m.name === '1') || modelViewer.model.materials[0];

            // 2. Watch for scroll to swap texture
            window.addEventListener('scroll', () => {
                const scrollPos = window.scrollY;
                const windowHeight = window.innerHeight;
                
                // Determine which "slide" we are on
                const currentId = scrollPos < windowHeight / 2 ? "1" : "2";
                
                // Update UI
                document.getElementById('shirt-title').innerText = archive[currentId].title;
                document.getElementById('shirt-price').innerText = archive[currentId].price;

                // Swap Texture
                if (material && textureCache[currentId]) {
                    material.pbrMetallicRoughness.baseColorTexture.setTexture(textureCache[currentId]);
                    // Sharp pixels
                    const sampler = material.pbrMetallicRoughness.baseColorTexture.texture.sampler;
                    sampler.setMinFilter(9728);
                    sampler.setMagFilter(9728);
                }
            });
        });
    </script>
</body>
</html>
